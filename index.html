function addFastFoodToLog(name, cal, p, c, f) {
  const dateStr = today();
  const plan = getOrCreatePlan(dateStr);
  if (!plan.loggedFoods) plan.loggedFoods = [];
  plan.loggedFoods.push({ id: uid(), name, calories: cal, protein: p, carbs: c, fat: f });
  saveState();
  if (STATE.currentView === 'today') renderTodayInPlace(dateStr);
  const toast = document.getElementById('ff-toast');
  if (toast) {
    toast.textContent = `Added "${name}" to today's log`;
    toast.style.opacity = '1';
    setTimeout(() => { if (toast) toast.style.opacity = '0'; }, 2200);
  }
}

function renderFastFood() {
  const restaurant = ffState.restaurant;
  if (restaurant) return renderFastFoodMenu(restaurant);

  return `
    <div style="padding-bottom:8px">
      <h1 style="font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px">Fast Food Explorer</h1>
      <p style="color:var(--text-2);font-size:14px;margin-bottom:20px">Browse menus & filter by macros</p>
      <input
        class="form-input"
        placeholder="🔍 Search restaurants..."
        style="margin-bottom:16px;font-size:15px"
        value="${(ffState.restaurantSearch||'').replace(/"/g,'&quot;')}"
        oninput="ffState.restaurantSearch=this.value;renderFastFoodInPlace()"
      >
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        ${FAST_FOOD_DB
          .filter(r => {
            const q = (ffState.restaurantSearch||'').toLowerCase();
            return !q || r.name.toLowerCase().includes(q) || r.type.toLowerCase().includes(q);
          })
          .map(r => `
          <button
            onclick="ffState.restaurant='${r.id}';ffState.search='';ffState.category='all';ffState.quickFilter='';ffState.sort='default';renderFastFoodInPlace()"
            style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:left;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:6px"
            onmouseover="this.style.borderColor='var(--primary)';this.style.background='var(--primary-light)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.background='var(--surface)'"
          >
            <span style="font-size:28px">${r.emoji}</span>
            <span style="font-size:14px;font-weight:700;color:var(--text);line-height:1.2">${r.name}</span>
            <span style="font-size:11px;color:var(--text-3);font-weight:500">${r.type}</span>
            <span style="font-size:11px;color:var(--text-3)">${r.buildYourOwn ? 'Build Your Own' : `${r.menu.length} items`}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderFastFoodMenu(restaurantId) {
  const r = FAST_FOOD_DB.find(x => x.id === restaurantId);
  if (!r) return renderFastFood();
  if (r.buildYourOwn) return renderChipotleBuilder(r);

  const { search, category, quickFilter, sort } = ffState;

  // Collect categories
  const cats = ['all', ...new Set(r.menu.map(i => i.cat))];

  // Filter items
  let items = r.menu.filter(item => {
    if (search && !item.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (category !== 'all' && item.cat !== category) return false;
    if (quickFilter === 'lowcal' && item.cal >= 400) return false;
    if (quickFilter === 'highprotein' && item.p < 25) return false;
    if (quickFilter === 'lowcarb' && item.c >= 30) return false;
    if (quickFilter === 'lowfat' && item.f >= 15) return false;
    return true;
  });

  // Sort
  if (sort === 'cal_asc') items = [...items].sort((a,b) => a.cal - b.cal);
  else if (sort === 'cal_desc') items = [...items].sort((a,b) => b.cal - a.cal);
  else if (sort === 'protein_desc') items = [...items].sort((a,b) => b.p - a.p);
  else if (sort === 'carbs_asc') items = [...items].sort((a,b) => a.c - b.c);

  const qfOpts = [
    { id: 'lowcal', label: '🟢 Low Cal', sub: '<400 cal' },
    { id: 'highprotein', label: '💪 High Protein', sub: '≥25g protein' },
    { id: 'lowcarb', label: '🥩 Low Carb', sub: '<30g carbs' },
    { id: 'lowfat', label: '✨ Low Fat', sub: '<15g fat' },
  ];

  return `
    <div id="ff-toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button onclick="ffState.restaurant=null;renderFastFoodInPlace()" style="background:var(--surface-2);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer">← Back</button>
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px">${r.emoji} ${r.name}</div>
        <div style="font-size:12px;color:var(--text-3)">${r.type} · ${r.menu.length} menu items</div>
      </div>
    </div>

    <!-- Search & Sort -->
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input
        class="form-input"
        placeholder="🔍 Search menu..."
        style="flex:1;font-size:14px;padding:10px 12px"
        value="${search.replace(/"/g,'&quot;')}"
        oninput="ffState.search=this.value;renderFastFoodInPlace()"
      >
      <select
        class="form-input"
        style="width:auto;font-size:13px;padding:10px 10px;cursor:pointer"
        onchange="ffState.sort=this.value;renderFastFoodInPlace()"
      >
        <option value="default" ${sort==='default'?'selected':''}>Default</option>
        <option value="cal_asc" ${sort==='cal_asc'?'selected':''}>Cal ↑</option>
        <option value="cal_desc" ${sort==='cal_desc'?'selected':''}>Cal ↓</option>
        <option value="protein_desc" ${sort==='protein_desc'?'selected':''}>Protein ↓</option>
        <option value="carbs_asc" ${sort==='carbs_asc'?'selected':''}>Carbs ↑</option>
      </select>
    </div>

    <!-- Quick Filters -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${qfOpts.map(q => `
        <button
          onclick="ffState.quickFilter=ffState.quickFilter==='${q.id}'?'':'${q.id}';renderFastFoodInPlace()"
          style="padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;${quickFilter===q.id?'background:var(--primary);color:#fff;border-color:var(--primary)':'background:var(--surface);color:var(--text-2);border-color:var(--border)'}"
        >${q.label} <span style="opacity:.75;font-weight:400">${q.sub}</span></button>
      `).join('')}
    </div>

    <!-- Category Tabs -->
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none">
      ${cats.map(cat => `
        <button
          onclick="ffState.category='${cat.replace(/'/g,"\\'")}';renderFastFoodInPlace()"
          style="flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;white-space:nowrap;transition:all .15s;${category===cat?'background:var(--text);color:#fff;border-color:var(--text)':'background:var(--surface);color:var(--text-2);border-color:var(--border)'}"
        >${cat === 'all' ? 'All Items' : cat}</button>
      `).join('')}
    </div>

    <!-- Results count -->
    <div style="font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:10px">${items.length} item${items.length!==1?'s':''} found</div>

    <!-- Menu Items -->
    <div style="display:flex;flex-direction:column;gap:10px">
      ${items.length === 0 ? `
        <div style="text-align:center;padding:40px 20px;color:var(--text-3)">
          <div style="font-size:36px;margin-bottom:8px">🔍</div>
          <div style="font-weight:600">No items match your filters</div>
          <div style="font-size:13px;margin-top:4px">Try adjusting your search or filters</div>
        </div>
      ` : items.map(item => {
        const maxMacro = Math.max(item.p * 4, item.c * 4, item.f * 9, 1);
        const pPct = Math.min(100, Math.round(item.p * 4 / item.cal * 100));
        const cPct = Math.min(100, Math.round(item.c * 4 / item.cal * 100));
        const fPct = Math.min(100, Math.round(item.f * 9 / item.cal * 100));
        const isLowCal = item.cal < 400;
        const isHighP = item.p >= 25;
        const isLowC = item.c < 30;
        const isLowF = item.f < 15;
        return `
        <div class="card" style="padding:14px 16px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px;line-height:1.3;margin-bottom:4px">${item.name}</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap">
                <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface-2);color:var(--text-2)">${item.cat}</span>
                ${isLowCal ? '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#dcfce7;color:#166534">Low Cal</span>' : ''}
                ${isHighP ? '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#ede9fe;color:#4c1d95">High Protein</span>' : ''}
                ${isLowC ? '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#fef9c3;color:#713f12">Low Carb</span>' : ''}
                ${isLowF ? '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#fce7f3;color:#831843">Low Fat</span>' : ''}
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:20px;font-weight:800;color:var(--primary);line-height:1">${item.cal}</div>
              <div style="font-size:10px;color:var(--text-3);font-weight:600">cal</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
            <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center">
              <div style="font-size:15px;font-weight:800;color:var(--protein)">${item.p}g</div>
              <div style="font-size:10px;color:var(--text-3);font-weight:600">Protein</div>
            </div>
            <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center">
              <div style="font-size:15px;font-weight:800;color:var(--carbs)">${item.c}g</div>
              <div style="font-size:10px;color:var(--text-3);font-weight:600">Carbs</div>
            </div>
            <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center">
              <div style="font-size:15px;font-weight:800;color:var(--fat)">${item.f}g</div>
              <div style="font-size:10px;color:var(--text-3);font-weight:600">Fat</div>
            </div>
          </div>
          <div style="display:flex;gap:3px;height:4px;border-radius:4px;overflow:hidden;margin-bottom:10px;background:var(--border)">
            <div style="width:${pPct}%;background:var(--protein);border-radius:4px 0 0 4px"></div>
            <div style="width:${cPct}%;background:var(--carbs)"></div>
            <div style="width:${fPct}%;background:var(--fat);border-radius:0 4px 4px 0"></div>
          </div>
          <button
            onclick="addFastFoodToLog('${item.name.replace(/'/g,"\\'")}',${item.cal},${item.p},${item.c},${item.f})"
            style="width:100%;padding:8px;border-radius:8px;font-size:13px;font-weight:700;background:var(--primary-light);color:var(--primary-dark);border:1.5px solid var(--primary);cursor:pointer;transition:all .15s"
            onmouseover="this.style.background='var(--primary)';this.style.color='#fff'"
            onmouseout="this.style.background='var(--primary-light)';this.style.color='var(--primary-dark)'"
          >+ Add to Today's Log</button>
        </div>
      `}).join('')}
    </div>
  `;
}

function renderChipotleBuilder(r) {
  const mode    = ffState.chipotleMode || 'build';
  const ing     = r.ingredients;
  const base    = ing.base.find(b => b.name === ffState.chipotleBase) || null;
  const rice    = ing.rice.find(b => b.name === ffState.chipotleRice) || null;
  const beans   = ing.beans.find(b => b.name === ffState.chipotleBeans) || null;
  const protein = ing.protein.find(b => b.name === ffState.chipotleProtein) || null;
  const extras  = (ffState.chipotleExtras || []).map(n => ing.extras.find(e => e.name === n)).filter(Boolean);
  const parts   = [base, rice, beans, protein, ...extras];
  const T = {
    cal: parts.reduce((s, x) => s + (x ? x.cal : 0), 0),
    p:   parts.reduce((s, x) => s + (x ? x.p   : 0), 0),
    c:   parts.reduce((s, x) => s + (x ? x.c   : 0), 0),
    f:   parts.reduce((s, x) => s + (x ? x.f   : 0), 0),
  };
  const canAdd   = !!(base && protein);
  const pText    = protein && protein.name !== 'No Meat' ? protein.name : 'Veggie';
  const mealName = base
    ? 'Chipotle ' + base.name + (protein ? ' (' + pText + ')' : '')
    : 'Chipotle Order';

  const chipBtn = (label, active, setter) =>
    `<button onclick="${setter};renderFastFoodInPlace()" style="padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .15s;${active ? 'background:var(--primary);color:#fff;border-color:var(--primary)' : 'background:var(--surface);color:var(--text-2);border-color:var(--border)'}">${label}</button>`;

  const calTag = cal => cal > 0 ? ` (+${cal})` : '';

  const stepCard = (num, title, req, btns) => `
    <div class="card" style="padding:14px 16px;margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">${num}. ${title} <span style="color:var(--text-3);font-weight:400;font-size:12px">(${req ? 'required' : 'optional'})</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${btns}</div>
    </div>`;

  const header = `
    <div id="ff-toast" style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button onclick="ffState.restaurant=null;renderFastFoodInPlace()" style="background:var(--surface-2);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer">← Back</button>
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px">🫔 Chipotle</div>
        <div style="font-size:12px;color:var(--text-3)">Mexican · Build Your Own</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button onclick="ffState.chipotleMode='build';renderFastFoodInPlace()" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s;${mode === 'build' ? 'background:var(--primary);color:#fff;border-color:var(--primary)' : 'background:var(--surface);color:var(--text-2);border-color:var(--border)'}">🌯 Build Your Own</button>
      <button onclick="ffState.chipotleMode='kids';renderFastFoodInPlace()" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s;${mode === 'kids' ? 'background:var(--primary);color:#fff;border-color:var(--primary)' : 'background:var(--surface);color:var(--text-2);border-color:var(--border)'}">🧒 Kid's Meals</button>
    </div>`;

  if (mode === 'kids') {
    return header + `
      <div style="font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:12px">${r.menu.length} item${r.menu.length !== 1 ? 's' : ''}</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${r.menu.map(item => {
          const pPct = Math.min(100, item.cal > 0 ? Math.round(item.p * 4 / item.cal * 100) : 0);
          const cPct = Math.min(100, item.cal > 0 ? Math.round(item.c * 4 / item.cal * 100) : 0);
          const fPct = Math.min(100, item.cal > 0 ? Math.round(item.f * 9 / item.cal * 100) : 0);
          return `
          <div class="card" style="padding:14px 16px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px;line-height:1.3;margin-bottom:4px">${item.name}</div>
                <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface-2);color:var(--text-2)">${item.cat}</span>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:20px;font-weight:800;color:var(--primary);line-height:1">${item.cal}</div>
                <div style="font-size:10px;color:var(--text-3);font-weight:600">cal</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
              <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--protein)">${item.p}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Protein</div></div>
              <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--carbs)">${item.c}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Carbs</div></div>
              <div style="background:var(--surface-2);border-radius:8px;padding:6px 8px;text-align:center"><div style="font-size:15px;font-weight:800;color:var(--fat)">${item.f}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Fat</div></div>
            </div>
            <div style="display:flex;gap:3px;height:4px;border-radius:4px;overflow:hidden;margin-bottom:10px;background:var(--border)">
              <div style="width:${pPct}%;background:var(--protein);border-radius:4px 0 0 4px"></div>
              <div style="width:${cPct}%;background:var(--carbs)"></div>
              <div style="width:${fPct}%;background:var(--fat);border-radius:0 4px 4px 0"></div>
            </div>
            <button onclick="addFastFoodToLog('${item.name.replace(/'/g,"\\'")}',${item.cal},${item.p},${item.c},${item.f})" style="width:100%;padding:8px;border-radius:8px;font-size:13px;font-weight:700;background:var(--primary-light);color:var(--primary-dark);border:1.5px solid var(--primary);cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--primary)';this.style.color='#fff'" onmouseout="this.style.background='var(--primary-light)';this.style.color='var(--primary-dark)'">+ Add to Today's Log</button>
          </div>`;
        }).join('')}
      </div>
    `;
  }

  return header + `
    <div class="card" style="padding:12px 16px;margin-bottom:16px;border:1.5px solid var(--primary);background:var(--primary-light)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:700;font-size:13px;color:var(--primary-dark)">Your Order Total</div>
        <div style="font-size:24px;font-weight:800;color:var(--primary);line-height:1">${T.cal} <span style="font-size:12px;color:var(--text-3)">cal</span></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
        <div style="background:rgba(255,255,255,.6);border-radius:8px;padding:5px 8px;text-align:center"><div style="font-size:14px;font-weight:800;color:var(--protein)">${T.p}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Protein</div></div>
        <div style="background:rgba(255,255,255,.6);border-radius:8px;padding:5px 8px;text-align:center"><div style="font-size:14px;font-weight:800;color:var(--carbs)">${T.c}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Carbs</div></div>
        <div style="background:rgba(255,255,255,.6);border-radius:8px;padding:5px 8px;text-align:center"><div style="font-size:14px;font-weight:800;color:var(--fat)">${T.f}g</div><div style="font-size:10px;color:var(--text-3);font-weight:600">Fat</div></div>
      </div>
    </div>
    ${stepCard('1', 'Choose Your Base', true, ing.base.map(b => chipBtn(b.name + calTag(b.cal), ffState.chipotleBase === b.name, `ffState.chipotleBase='${b.name}'`)).join(''))}
    ${stepCard('2', 'Rice', false, ing.rice.map(b => chipBtn(b.name + calTag(b.cal), ffState.chipotleRice === b.name, `ffState.chipotleRice='${b.name}'`)).join(''))}
    ${stepCard('3', 'Beans', false, ing.beans.map(b => chipBtn(b.name + calTag(b.cal), ffState.chipotleBeans === b.name, `ffState.chipotleBeans='${b.name}'`)).join(''))}
    ${stepCard('4', 'Protein', true, ing.protein.map(b => chipBtn(b.name + calTag(b.cal), ffState.chipotleProtein === b.name, `ffState.chipotleProtein='${b.name}'`)).join(''))}
    ${stepCard('5', 'Toppings & Extras', false, ing.extras.map(e => {
      const sel = (ffState.chipotleExtras || []).includes(e.name);
      const esc = e.name.replace(/'/g, "\\'");
      return chipBtn(e.name + calTag(e.cal), sel, `ffState.chipotleExtras=(ffState.chipotleExtras||[]).includes('${esc}')?ffState.chipotleExtras.filter(x=>x!=='${esc}'):[...(ffState.chipotleExtras||[]),'${esc}']`);
    }).join(''))}
    <button
      onclick="${canAdd ? `addFastFoodToLog('${mealName}',${T.cal},${T.p},${T.c},${T.f})` : ''}"
      ${canAdd ? '' : 'disabled'}
      style="width:100%;padding:14px;border-radius:10px;font-size:14px;font-weight:700;border:1.5px solid ${canAdd ? 'var(--primary)' : 'var(--border)'};background:${canAdd ? 'var(--primary)' : 'var(--surface-2)'};color:${canAdd ? '#fff' : 'var(--text-3)'};cursor:${canAdd ? 'pointer' : 'not-allowed'};transition:all .2s;margin-bottom:16px"
    >${canAdd ? '+ Add to Today\'s Log' : 'Select a base & protein to continue'}</button>
  `;
}

function renderFastFoodInPlace() {
  const content = document.querySelector('.page-content');
  if (content) content.innerHTML = renderFastFood();
}

    { size: 90, x:42, y:12, color:'rgba(251,207,232,0.30)', dur:8  },
    { size:130, x:92, y:75, color:'rgba(196,181,253,0.22)', dur:16 },
    { size: 80, x:18, y:85, color:'rgba(134,239,172,0.25)', dur:6  },
  ];
  container.innerHTML = defs.map(b =>
    `<div class="bbub" style="width:${b.size}px;height:${b.size}px;left:${b.x}%;top:${b.y}%;background:${b.color};animation-duration:${b.dur}s;animation-delay:${-(b.dur/2)}s"></div>`
  ).join('');
}

initBubbles();
render();
setInterval(checkMidnightReset, 60000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkMidnightReset(); });
</script>
</body>
</html>

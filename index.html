function submitPlanWeek() {
  const targets = {
    calories: parseFloat(document.getElementById('pw-calories').value) || STATE.profile.calories,
    protein:  parseFloat(document.getElementById('pw-protein').value)  || STATE.profile.protein,
    carbs:    parseFloat(document.getElementById('pw-carbs').value)    || STATE.profile.carbs,
    fat:      parseFloat(document.getElementById('pw-fat').value)      || STATE.profile.fat
  };
  const ingredientsToUse = pwIngredientsList.join(', ');
  const cuisinePrefs = pwSelectedCuisines.slice();
  const mealCounts = {};
  ['breakfast','lunch','dinner','snack','dessert'].forEach(cat => {
    const el = document.getElementById(`pw-${cat}`);
    if (el && !el.disabled) {
      const v = parseInt(el.value);
      if (!isNaN(v)) mealCounts[cat] = Math.max(1, Math.min(7, v));
    }
  });
  const perDayStructures = Array.from({length: 7}, (_, i) => ({
    breakfast: document.getElementById(`pw-toggle-breakfast-${i}`)?.dataset.active === 'true',
    lunch:     document.getElementById(`pw-toggle-lunch-${i}`)?.dataset.active === 'true',
    dinner:    document.getElementById(`pw-toggle-dinner-${i}`)?.dataset.active === 'true',
    snacks:    Math.max(0, Math.min(5, parseInt(document.getElementById(`pw-snacks-${i}`)?.value) || 0)),
    desserts:  Math.max(0, Math.min(3, parseInt(document.getElementById(`pw-desserts-${i}`)?.value) || 0))
  }));
  const importedMeals = {};
  pwImportedMealIds.forEach(id => {
    const meal = (STATE.savedMeals || []).find(m => m.id === id);
    if (!meal) return;
    const cat = meal.category || 'dinner';
    if (!importedMeals[cat]) importedMeals[cat] = [];
    importedMeals[cat].push({ ...meal, category: cat });
  });
  document.getElementById('plan-week-modal').remove();
  planWholeWeek({ targets, ingredientsToUse, cuisinePrefs, mealCounts, perDayStructures, importedMeals });
}

async function planWholeWeek(opts = {}) {
  const { targets: customTargets, ingredientsToUse = '', cuisinePrefs = [], mealCounts = {}, slotStructure, perDayStructures, importedMeals = {} } = opts;
  // Save snapshot before making any changes so the X button can revert
  _planWeekSnapshot = JSON.parse(JSON.stringify(STATE.dailyPlans));
  const targets = customTargets || STATE.profile;
  const cuisineSuffix = cuisinePrefs.length ? ` Cuisine style: ${cuisinePrefs.join(', ')}.` : '';
  const ingSuffix = ingredientsToUse ? ` Use these ingredients: ${ingredientsToUse}` : '';
  const dates = getWeekDates();

  // Rebuild each day's slots to match the requested structure before filling
  if (perDayStructures || slotStructure) {
    dates.forEach((d, idx) => {
      const struct = perDayStructures ? perDayStructures[idx] : slotStructure;
      const { breakfast, lunch, dinner, snacks, desserts } = struct;
      const plan = getOrCreatePlan(d);
      const pool = [...plan.slots];
      const take = cat => {
        const i = pool.findIndex(s => (s.category || slotMealType(s)) === cat);
        return i >= 0 ? pool.splice(i, 1)[0] : null;
      };
      const newSlots = [];
      if (breakfast) newSlots.push(take('breakfast') || { id: uid(), type:'meal',  category:'breakfast', label:'Breakfast', preference:'', meal:null, open:false, seenNames:[] });
      if (lunch)     newSlots.push(take('lunch')     || { id: uid(), type:'meal',  category:'lunch',     label:'Lunch',     preference:'', meal:null, open:false, seenNames:[] });
      if (dinner)    newSlots.push(take('dinner')    || { id: uid(), type:'meal',  category:'dinner',    label:'Dinner',    preference:'', meal:null, open:false, seenNames:[] });
      for (let i = 0; i < snacks; i++) {
        const s = take('snack') || { id: uid(), type:'snack', category:'snack',   label:`Snack ${i+1}`,  preference:'', meal:null, open:false, seenNames:[] };
        s.label = `Snack ${i+1}`;
        newSlots.push(s);
      }
      for (let i = 0; i < desserts; i++) {
        newSlots.push(take('dessert') || { id: uid(), type:'meal',  category:'dessert',  label:'Dessert',   preference:'', meal:null, open:false, seenNames:[] });
      }
      plan.slots = newSlots;
    });
    saveState();
  }
  const btn = document.getElementById('plan-week-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spinner spinner-dark"></span> Planning...`; }

  // Collect all empty slots grouped by category for pool generation
  const categorySlots = {};
  dates.forEach(d => {
    const plan = getOrCreatePlan(d);
    plan.slots.filter(s => !s.meal).forEach(slot => {
      const cat = slotMealType(slot);
      if (!categorySlots[cat]) categorySlots[cat] = [];
      categorySlots[cat].push({ slot, dateStr: d });
    });
  });

  // Pre-generate meal pools for categories with limited variety or imported meals
  const mealPools = {};
  for (const [cat, slots] of Object.entries(categorySlots)) {
    const imported = (importedMeals[cat] || []);
    const desired = mealCounts[cat] != null ? Math.max(1, Math.min(slots.length, mealCounts[cat])) : null;
    const poolTargetSize = desired !== null ? desired : slots.length;
    const needsPool = imported.length > 0 || (desired !== null && desired < slots.length);
    if (needsPool) {
      if (btn) btn.innerHTML = `<span class="spinner spinner-dark"></span> Building ${cat} pool...`;
      mealPools[cat] = [];
      const poolExclude = [];
      // Seed pool with imported meals first
      imported.forEach(m => {
        mealPools[cat].push({ ...m });
        poolExclude.push(m.name);
      });
      const toGenerate = Math.max(0, poolTargetSize - imported.length);
      if (toGenerate > 0) {
        const { totals: fixedTotals } = getActiveFixedTotals(slots[0].dateStr);
        const roughRemaining = {
          calories: Math.max(0, targets.calories - fixedTotals.calories),
          protein:  Math.max(0, targets.protein  - fixedTotals.protein),
          carbs:    Math.max(0, targets.carbs    - fixedTotals.carbs),
          fat:      Math.max(0, targets.fat      - fixedTotals.fat)
        };
        // Use one day's full slot distribution for weight calculation, not all 7 days of a
        // single category — otherwise totalWeight is inflated 7x and each pool meal gets
        // only 1/7 of its correct calorie allocation.
        const firstDayPlan = getOrCreatePlan(slots[0].dateStr);
        const firstDayEmptySlots = firstDayPlan.slots.filter(s => !s.meal);
        const roughWtSlots = firstDayEmptySlots.length > 0 ? firstDayEmptySlots : [slots[0].slot];
        const roughWt = weightedSlotTarget(slots[0].slot, roughRemaining, roughWtSlots);
        for (let i = 0; i < toGenerate; i++) {
          try {
            const recipe = await generateRecipe({
              preference: (slots[0].slot.preference || '') + ingSuffix + cuisineSuffix,
              targetCal:   Math.round(Math.max(100, roughWt.cal)),
              targetProt:  Math.round(roughWt.prot),
              targetCarbs: Math.round(roughWt.carbs),
              targetFat:   Math.round(roughWt.fat),
              mealType: cat,
              excludeNames: poolExclude,
              cuisineFilter: cuisinePrefs,
              allergyFilter: STATE.allergies || [],
              dietaryFilter: STATE.dietaryRestrictions || []
            });
            mealPools[cat].push(recipe);
            poolExclude.push(recipe.name);
          } catch(e) { /* skip failed pool entries */ }
        }
      }
      if (mealPools[cat].length === 0) delete mealPools[cat];
    }
  }

  // Track pool index per category for cycling
  const catPoolIdx = {};
  // Track meal names used per category across days (for non-pool categories)
  const weekUsedNames = {};

  const dayResults = [];
  let totalFilled = 0;
  let totalErrors = 0;

  for (const d of dates) {
    const dayLabel = new Date(d + 'T12:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    if (btn) btn.innerHTML = `<span class="spinner spinner-dark"></span> ${dayLabel}...`;

    const plan = getOrCreatePlan(d);
    const emptySlots = plan.slots.filter(s => !s.meal);

    if (!emptySlots.length) {
      dayResults.push({ date: d, dayLabel, skipped: true });
      continue;
    }

    const { totals: fixedTotals } = getActiveFixedTotals(d);
    let usedCal   = fixedTotals.calories;
    let usedProt  = fixedTotals.protein;
    let usedCarbs = fixedTotals.carbs;
    let usedFat   = fixedTotals.fat;
    plan.slots.filter(s => s.meal).forEach(s => {
      usedCal   += s.meal.calories || 0;
      usedProt  += s.meal.protein  || 0;
      usedCarbs += s.meal.carbs    || 0;
      usedFat   += s.meal.fat      || 0;
    });

    let dayFilled = 0;
    let dayErrors = 0;

    for (const slot of emptySlots) {
      const cat = slotMealType(slot);
      const pool = mealPools[cat];
      if (pool && pool.length > 0) {
        const idx = (catPoolIdx[cat] || 0) % pool.length;
        catPoolIdx[cat] = (catPoolIdx[cat] || 0) + 1;
        let poolMeal = { ...pool[idx] };
        // Cap to remaining calorie budget so we never exceed the daily limit
        const remainingBudget = targets.calories - usedCal;
        if ((poolMeal.calories || 0) > remainingBudget && remainingBudget > 50) {
          const cs = remainingBudget / poolMeal.calories;
          poolMeal = { ...poolMeal, calories: Math.round(remainingBudget), protein: Math.round((poolMeal.protein||0)*cs), carbs: Math.round((poolMeal.carbs||0)*cs), fat: Math.round((poolMeal.fat||0)*cs) };
        }
        slot.meal = poolMeal;
        usedCal   += slot.meal.calories || 0;
        usedProt  += slot.meal.protein  || 0;
        usedCarbs += slot.meal.carbs    || 0;
        usedFat   += slot.meal.fat      || 0;
        dayFilled++;
      } else {
        const stillEmpty = plan.slots.filter(s => !s.meal);
        const remaining = {
          calories: Math.max(0, targets.calories - usedCal),
          protein:  Math.max(0, targets.protein  - usedProt),
          carbs:    Math.max(0, targets.carbs     - usedCarbs),
          fat:      Math.max(0, targets.fat       - usedFat)
        };
        const wt = weightedSlotTarget(slot, remaining, stillEmpty);
        // Never ask for more calories than remain in the daily budget
        const budgetLeft = targets.calories - usedCal;
        const cappedTargetCal = Math.min(Math.round(Math.max(100, wt.cal)), Math.max(100, budgetLeft));
        try {
          const recipe = await generateRecipe({
            preference: (slot.preference || '') + ingSuffix + cuisineSuffix,
            targetCal:   cappedTargetCal,
            targetProt:  Math.round(wt.prot),
            targetCarbs: Math.round(wt.carbs),
            targetFat:   Math.round(wt.fat),
            mealType: cat,
            excludeNames: weekUsedNames[cat] || [],
            cuisineFilter: cuisinePrefs,
            allergyFilter: STATE.allergies || [],
            dietaryFilter: STATE.dietaryRestrictions || []
          });
          // Hard cap: don't exceed remaining daily budget
          let finalRecipe = recipe;
          if ((finalRecipe.calories || 0) > budgetLeft && budgetLeft > 50) {
            const cs = budgetLeft / finalRecipe.calories;
            finalRecipe = { ...finalRecipe, calories: Math.round(budgetLeft), protein: Math.round((finalRecipe.protein||0)*cs), carbs: Math.round((finalRecipe.carbs||0)*cs), fat: Math.round((finalRecipe.fat||0)*cs) };
          }
          slot.meal  = finalRecipe;
          usedCal   += finalRecipe.calories || 0;
          usedProt  += finalRecipe.protein  || 0;
          usedCarbs += finalRecipe.carbs    || 0;
          usedFat   += finalRecipe.fat      || 0;
          if (!weekUsedNames[cat]) weekUsedNames[cat] = [];
          weekUsedNames[cat].push(finalRecipe.name);
          dayFilled++;
        } catch(e) {
          // Retry without name exclusions as fallback
          try {
            const recipe = await generateRecipe({
              preference: (slot.preference || '') + ingSuffix + cuisineSuffix,
              targetCal:   cappedTargetCal,
              targetProt:  Math.round(wt.prot),
              targetCarbs: Math.round(wt.carbs),
              targetFat:   Math.round(wt.fat),
              mealType: cat,
              excludeNames: []
            });
            let finalRecipe = recipe;
            if ((finalRecipe.calories || 0) > budgetLeft && budgetLeft > 50) {
              const cs = budgetLeft / finalRecipe.calories;
              finalRecipe = { ...finalRecipe, calories: Math.round(budgetLeft), protein: Math.round((finalRecipe.protein||0)*cs), carbs: Math.round((finalRecipe.carbs||0)*cs), fat: Math.round((finalRecipe.fat||0)*cs) };
            }
            slot.meal  = finalRecipe;
            usedCal   += finalRecipe.calories || 0;
            usedProt  += finalRecipe.protein  || 0;
            usedCarbs += finalRecipe.carbs    || 0;
            usedFat   += finalRecipe.fat      || 0;
            if (!weekUsedNames[cat]) weekUsedNames[cat] = [];
            weekUsedNames[cat].push(finalRecipe.name);
            dayFilled++;
          } catch(e2) {
            dayErrors++;
            totalErrors++;
          }
        }
      }
    }

    saveState();
    totalFilled += dayFilled;
    dayResults.push({ date: d, dayLabel, filled: dayFilled, errors: dayErrors, cal: Math.round(usedCal), prot: Math.round(usedProt), carbs: Math.round(usedCarbs), fat: Math.round(usedFat) });
  }

  if (btn) { btn.disabled = false; btn.innerHTML = `${IC.sparkle} Plan Week`; }
  render();
  showWeekPlanSummary(dayResults, totalFilled, totalErrors, targets, _planWeekSnapshot);
}

function renderGroceryList(dates) {
  // Aggregate ingredients from all planned meals
  const allIngredients = [];
  dates.forEach(d => {
    const plan = STATE.dailyPlans[d];
    if (!plan) return;
    const dayLabel = new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    plan.slots.forEach(slot => {
      if (slot.meal?.ingredients) {
        slot.meal.ingredients.forEach(ing => {
          allIngredients.push({ ...ing, day: dayLabel, meal: slot.meal.name, slotLabel: slot.label });
        });
      }
    });
  });

  // Normalize ingredient name by stripping preparation descriptors
  function normalizeIngredientName(name) {
    return name
      .replace(/\s*\([^)]*\)/g, '')
      .replace(/\s+or\s+.+$/i, '')
      .replace(/,\s*(halved|sliced|diced|chopped|minced|crushed|grated|shredded|peeled|cored|seeded|trimmed|washed|torn|roughly|finely|thinly|coarsely|freshly|ground|quartered|julienned|cubed|mashed|pureed|roasted|toasted|blanched|caramelized|softened|melted|cooked|grilled|baked|steamed|boiled).*$/i, '')
      .replace(/\s*[-–]\s*(halved|sliced|diced|chopped|minced|crushed|grated|shredded|peeled|cored|seeded|trimmed|washed|torn|roughly|finely|thinly|coarsely|freshly|ground|whole|quartered|julienned|cubed|mashed|pureed|roasted|toasted|blanched|caramelized|softened|melted|cooked|grilled).*$/i, '')
      .replace(/\s+(halved|sliced|diced|chopped|minced|crushed|grated|shredded|peeled|cored|seeded|trimmed|washed|torn|quartered|julienned|cubed|mashed|pureed|cooked|grilled)$/i, '')
      .replace(/^(fresh|ripe|raw|cooked)\s+/i, '')
      .trim();
  }

  // Split "X and Y" or "A, B, C" combined ingredients into separate entries
  function splitCombinedIngredient(ing) {
    const name = ing.item;
    const amt = parseFloat(ing.amount) || 0;
    const andMatch = name.match(/^(.+?)\s+and\s+(.+)$/i);
    if (andMatch) {
      return [andMatch[1].trim(), andMatch[2].trim()]
        .map(p => ({ ...ing, item: p, amount: amt / 2 }));
    }
    const commaParts = name.split(/,\s+/);
    if (commaParts.length >= 3 && commaParts.every(p => p.trim().split(/\s+/).length <= 3)) {
      return commaParts.map(p => ({ ...ing, item: p.trim(), amount: amt / commaParts.length }));
    }
    return [ing];
  }

  function canonicalizeIngredient(name) {
    const lower = name.toLowerCase().trim();
    if (/\bcorn tortilla/.test(lower)) return 'Corn Tortilla';
    if (/\btortilla/.test(lower)) return 'Tortilla';
    if (/\b(white|basmati|jasmine|brown|long.grain|short.grain|arborio|wild|sushi|calrose)\s+rice\b/.test(lower)) return 'Rice';
    if (/\bromaine\b/.test(lower)) return 'Romaine lettuce';
    if (/butter lettuce/.test(lower)) return 'Butter lettuce';
    if (/rice cake/.test(lower)) return 'Rice cakes';
    if (/\beggs?\b/.test(lower) && !/egg whites?/.test(lower)) return 'Eggs';
    if (/\bgarlic\b/.test(lower) && !/garlic\s+(powder|salt|flake|chip)/.test(lower)) return 'Garlic';
    if (/\bcheddar\b/.test(lower)) return 'Cheddar cheese';
    if (/\bmozzarella\b/.test(lower)) return 'Mozzarella';
    if (/\bparmesan\b/.test(lower)) return 'Parmesan';
    if (/\b(red|green|yellow|orange)\s+bell pepper\b/.test(lower) || lower === 'bell pepper') return 'Bell pepper';
    if (/\bchicken breast\b/.test(lower)) return 'Chicken breast';
    if (/\bgreek yogurt\b/.test(lower)) return 'Greek yogurt';
    if (/\bground beef\b/.test(lower)) return 'Ground beef';
    if (/\bground turkey\b/.test(lower)) return 'Ground turkey';
    if (/\bonion\b/.test(lower) && !/onion\s+(powder|flake|salt)/.test(lower) && !/green onion|spring onion|red onion|shallot/.test(lower)) return 'Onion';
    return name.charAt(0).toUpperCase() + name.slice(1);
  }

  // Group and combine ingredients by canonical name, summing amounts by unit
  const grouped = {};
  allIngredients.forEach(rawIng => {
    const normalized = { ...rawIng, item: normalizeIngredientName(rawIng.item) };
    const split = splitCombinedIngredient(normalized);
    split.forEach(ing => {
      const canonical = canonicalizeIngredient(ing.item);
      const key = canonical.toLowerCase();
      if (!grouped[key]) grouped[key] = { item: canonical, amounts: {}, kitchenAmts: {}, meals: [] };
      const unit = ing.unit || '';
      if (!grouped[key].amounts[unit]) grouped[key].amounts[unit] = 0;
      const rawAmt = parseFloat(ing.amount) || 0;
      grouped[key].amounts[unit] += rawAmt;
      // Accumulate kitchen-unit totals (skip count-based and 'each' produce — handled by toGroceryQuantity)
      const kinfo = getKitchenInfo(ing.item, unit);
      if (kinfo && kinfo.unit !== 'each' && rawAmt > 0) {
        if (!grouped[key].kitchenAmts[kinfo.unit]) grouped[key].kitchenAmts[kinfo.unit] = 0;
        grouped[key].kitchenAmts[kinfo.unit] += rawAmt / kinfo.factor;
      }
      const useLabel = `${ing.day} – ${ing.meal}`;
      if (!grouped[key].meals.includes(useLabel)) grouped[key].meals.push(useLabel);
    });
  });

  // Convert amounts to grocery-store-friendly quantities
  function toGroceryQuantity(itemName, amounts, category) {
    const name = itemName.toLowerCase();
    let g = amounts['g'] || 0;
    const ml = amounts['ml'] || 0;

    const isSpice = /\b(salt|pepper|paprika|cumin|oregano|thyme|rosemary|basil|seasoning|spice|garlic powder|onion powder|chili powder|curry powder|curry paste|cayenne|turmeric|cinnamon|nutmeg|cardamom|coriander|allspice|bouillon|tajin|smoked paprika|red pepper flake|italian herb|taco seasoning|black pepper|white pepper|dried herb)\b/.test(name);
    if (isSpice || amounts['to taste'] > 0 || amounts['pinch'] > 0 || amounts['spray'] > 0) {
      return 'as needed';
    }

    for (const u of ['egg','eggs','egg white','egg whites','cake','slice','slices','clove','cloves','tortilla','corn tortilla','lemon','cucumber','wedge']) {
      if (amounts[u] > 0) {
        const n = Math.ceil(amounts[u]);
        return `${n} ${u}${n > 1 && !u.endsWith('s') ? 's' : ''}`;
      }
    }

    // Convert medium/large/small count units to grams via per-item weights
    const countN = (amounts['medium'] || 0) + (amounts['large'] || 0) + (amounts['small'] || 0);
    if (countN > 0) {
      const countWeights = [
        [/\bavocado\b/, 150], [/\bbanana\b/, 120], [/\bapple\b/, 180],
        [/\borange\b/, 180], [/\blemon\b/, 80], [/\blime\b/, 60],
        [/\bmango\b/, 200], [/bell pepper|red pepper(?! flake)|green pepper|yellow pepper/, 150],
        [/\bred onion\b/, 150], [/\bonion\b/, 150], [/sweet potato/, 200],
        [/\bpotato\b/, 150], [/(?<!cherry )\btomato\b/, 120], [/\bcucumber\b/, 200],
        [/\bzucchini\b/, 200], [/\bcarrot\b/, 80],
      ];
      let converted = false;
      for (const [re, wt] of countWeights) {
        if (re.test(name)) { g += Math.round(countN * wt); converted = true; break; }
      }
      if (!converted && g === 0) {
        const szUnit = amounts['medium'] > 0 ? 'medium' : amounts['large'] > 0 ? 'large' : 'small';
        const n = Math.ceil(countN);
        return `${n} ${szUnit}${n > 1 ? 's' : ''}`;
      }
    }

    if (g > 0) {
      const byCount = [
        [/\bavocado\b/, 150, 'avocado'],
        [/\bbanana\b/, 120, 'banana'],
        [/\bapple\b/, 180, 'apple'],
        [/\borange\b/, 180, 'orange'],
        [/\blemon\b/, 80, 'lemon'],
        [/\blime\b/, 60, 'lime'],
        [/\bmango\b/, 200, 'mango'],
        [/bell pepper|red pepper(?! flake)|green pepper|yellow pepper/, 150, 'bell pepper'],
        [/\bred onion\b/, 150, 'red onion'],
        [/\bonion\b/, 150, 'onion'],
        [/sweet potato/, 200, 'sweet potato'],
        [/\bpotato\b/, 150, 'potato'],
        [/(?<!cherry )\btomato\b/, 120, 'tomato'],
        [/\bcucumber\b/, 200, 'cucumber'],
        [/\bzucchini\b/, 200, 'zucchini'],
        [/\bcarrot\b/, 80, 'carrot'],
        [/broccoli/, 350, 'head of broccoli'],
        [/cauliflower/, 600, 'head of cauliflower'],
      ];
      for (const [re, wt, label] of byCount) {
        if (re.test(name)) {
          const n = Math.ceil(g / wt);
          const unit = label + (n > 1 && !label.endsWith('s') ? 's' : '');
          return `~${n} ${unit}`;
        }
      }
      if (/spinach|kale|arugula|romaine|lettuce|cabbage/.test(name)) return g <= 100 ? 'small bag (5 oz)' : 'large bag (10 oz)';
      if (/cherry tomato/.test(name)) return g <= 200 ? '1 pint' : '2 pints';
      if (/mushroom/.test(name)) return g <= 150 ? '8 oz container' : '16 oz container';
      if (/asparagus/.test(name)) return '1 bunch';
      if (/green bean/.test(name)) return g <= 150 ? '½ lb bag' : '1 lb bag';
      if (/snap pea|snow pea/.test(name)) return '1 bag (8 oz)';
      if (/chicken|ground turkey|ground beef|ground pork|ground chicken|pork(?! rinds)|turkey(?! sausage)|salmon|shrimp|cod|tilapia|halibut|sea bass|mahi/.test(name) || /\bsteak\b|\bsirloin\b|\bflank\b|\btenderloin\b|\bfilet\b/.test(name)) {
        const lbs = g / 453.6;
        if (lbs <= 0.33) return '~¼ lb';
        if (lbs <= 0.6) return '~½ lb';
        if (lbs <= 0.85) return '~¾ lb';
        if (lbs <= 1.15) return '~1 lb';
        if (lbs <= 1.6) return '~1½ lb';
        return `~${Math.round(lbs)} lb`;
      }
      if (/cheese|mozzarella|parmesan|feta|cheddar|ricotta|gouda|provolone/.test(name)) {
        const oz = Math.round(g / 28.35);
        return oz <= 2 ? '~2 oz' : `~${Math.ceil(oz / 4) * 4} oz`;
      }
      if (/greek yogurt|cottage cheese/.test(name)) return g <= 200 ? 'small container (7 oz)' : '1 container (16 oz)';
      if (/\brice\b|pasta|penne|spaghetti|fettuccine|\boats\b|oatmeal|quinoa|couscous|barley/.test(name)) return g <= 200 ? 'small bag (1 lb)' : 'large bag (2 lb)';
      if (/canned|diced tomato|crushed tomato|tomato paste|tomato sauce|black bean|kidney bean|chickpea|lentil(?! soup)|\bcorn\b/.test(name)) {
        const cans = Math.ceil(g / 400);
        return `${cans} can${cans > 1 ? 's' : ''} (15 oz each)`;
      }
      const oz = g / 28.35;
      return oz < 1 ? 'small amount' : `~${Math.round(oz)} oz`;
    }

    if (ml > 0) {
      if (/broth|stock/.test(name)) return ml <= 500 ? '1 carton (32 oz)' : '2 cartons (32 oz)';
      if (/coconut milk|coconut cream/.test(name)) return '1 can (13.5 oz)';
      if (/soy sauce|worcestershire|fish sauce|hot sauce|sriracha|teriyaki|hoisin|oyster sauce|mirin/.test(name)) return 'small bottle';
      if (/olive oil|sesame oil|vegetable oil|coconut oil/.test(name)) return ml <= 50 ? 'small bottle' : '1 bottle';
      if (/almond milk|oat milk|soy milk/.test(name)) return '½ gallon';
      if (/\bmilk\b/.test(name)) return ml <= 100 ? 'small carton' : '½ gallon';
      if (/heavy cream|whipping cream/.test(name)) return 'small carton (1 pt)';
      if (/lemon juice|lime juice/.test(name)) return 'small bottle';
      if (/vinegar/.test(name)) return 'small bottle';
      if (/honey|maple syrup/.test(name)) return 'small bottle';
      const floz = Math.ceil(ml / 29.57);
      return `~${floz} fl oz`;
    }

    return Object.entries(amounts)
      .filter(([_, v]) => v > 0)
      .map(([u, v]) => `${Math.round(v * 10) / 10}${u ? ' ' + u : ''}`)
      .join(' + ');
  }

  const CATEGORIES = [
    { label: 'Produce', color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0', keywords: ['apple','apples','banana','bananas','orange','oranges','lemon','lemons','lime','limes','berry','berries','strawberry','blueberry','raspberry','grape','grapes','mango','pineapple','peach','pear','plum','watermelon','melon','avocado','tomato','tomatoes','cherry tomato','cucumber','zucchini','squash','bell pepper','jalapeño pepper','jalapeño','jalapeno','onion','onions','garlic','shallot','potato','potatoes','sweet potato','carrot','carrots','celery','broccoli','cauliflower','spinach','kale','lettuce','romaine','arugula','cabbage','brussels','mushroom','mushrooms','asparagus','corn','pea','peas','edamame','leek','ginger','beet','beets','radish','artichoke','eggplant','fennel','chard','cilantro','parsley','basil','mint','thyme','rosemary','sage','dill','chive','chives','scallion','scallions','herb','herbs','green onion','snap pea','water chestnut'] },
    { label: 'Meat & Seafood', color: '#dc2626', bg: '#fff1f2', border: '#fecdd3', keywords: ['chicken','beef','pork','turkey','lamb','veal','duck','steak','ground beef','bacon','sausage','ham','salami','pepperoni','brisket','ribs','loin','thigh','breast','wing','drumstick','fish','salmon','tuna','tilapia','cod','shrimp','prawn','prawns','crab','lobster','scallop','scallops','clam','clams','oyster','oysters','anchovy','anchovies','sardine','sardines','mahi','halibut','trout','catfish','sea bass','meatball','meatballs','chorizo','pancetta','prosciutto','deli meat','ground turkey','ground pork'] },
    { label: 'Dairy & Eggs', color: '#2563eb', bg: '#eff6ff', border: '#bfdbfe', keywords: ['milk','cream','butter','cheese','cheddar','mozzarella','parmesan','feta','ricotta','brie','gouda','swiss','provolone','cream cheese','cottage cheese','sour cream','yogurt','greek yogurt','kefir','half and half','heavy cream','whipped cream','egg','eggs','ghee','buttermilk','ice cream','gelato'] },
    { label: 'Grains & Bread', color: '#b45309', bg: '#fffbeb', border: '#fde68a', keywords: ['bread','roll','rolls','bun','buns','bagel','bagels','tortilla','tortillas','pita','naan','rice','brown rice','white rice','basmati','pasta','spaghetti','penne','fettuccine','lasagna','noodle','noodles','quinoa','oat','oats','oatmeal','granola','cereal','flour','whole wheat','cornmeal','breadcrumb','breadcrumbs','cracker','crackers','pretzel','pretzels','wrap','wraps','couscous','bulgur','barley','farro','millet','rye','sourdough','baguette','croissant','muffin','muffins','waffle','waffles','pancake','pancakes'] },
    { label: 'Canned & Pantry', color: '#ea580c', bg: '#fff7ed', border: '#fed7aa', keywords: ['canned','can of','tomato sauce','tomato paste','crushed tomatoes','diced tomatoes','chicken broth','beef broth','vegetable broth','stock','coconut milk','coconut cream','almond milk','oat milk','soy milk','coconut water','chickpea','chickpeas','lentil','lentils','black bean','kidney bean','white bean','navy bean','pinto bean','refried beans','olive','olives','pickle','pickles','soy sauce','fish sauce','worcestershire','vinegar','oil','olive oil','vegetable oil','coconut oil','sesame oil','honey','maple syrup','sugar','brown sugar','hot sauce','sriracha','ketchup','mustard','mayo','mayonnaise','relish','jam','jelly','peanut butter','almond butter','tahini','hummus','salsa','guacamole','nut','nuts','almond','almonds','walnut','walnuts','cashew','cashews','pecan','pecans','pine nut','pine nuts','seed','seeds','flaxseed','chia','sunflower seed','pumpkin seed','raisin','raisins','dried fruit','chocolate','cocoa','vanilla','baking powder','baking soda','yeast','cornstarch','gelatin','protein powder','miso','hoisin','oyster sauce','teriyaki','mirin','cooking spray','dijon','pumpkin puree','italian seasoning','italian herb','taco seasoning','everything bagel seasoning','pumpkin pie spice','tikka masala spice','garlic powder','onion powder','smoked paprika','garlic salt','chili powder','curry powder','curry paste','red pepper flake','cayenne','black pepper','ground ginger','dried oregano','dried thyme','dried rosemary','dried basil','allspice','cardamom','coriander','bouillon','tajin','tajín','paprika','cumin','turmeric','cinnamon','nutmeg','oregano','seasoning','spice blend','salt'] },
    { label: 'Frozen', color: '#7c3aed', bg: '#f5f3ff', border: '#ddd6fe', keywords: ['frozen','ice cream','gelato','frozen vegetable','frozen fruit','frozen meal','frozen pizza','frozen waffle'] },
  ];

  // Use longest keyword match to correctly distinguish e.g. "garlic powder" (Seasoning) from "garlic" (Produce)
  function getCategory(itemName) {
    const name = itemName.toLowerCase();
    let bestCat = null;
    let bestLen = -1;
    for (const cat of CATEGORIES) {
      for (const kw of cat.keywords) {
        if (name.includes(kw) && kw.length > bestLen) {
          bestLen = kw.length;
          bestCat = cat.label;
        }
      }
    }
    return bestCat || 'Other';
  }

  const CATEGORY_ORDER = ['Produce','Meat & Seafood','Dairy & Eggs','Grains & Bread','Canned & Pantry','Frozen','Other'];
  const CATEGORY_META = Object.fromEntries([
    ...CATEGORIES.map(c => [c.label, { color: c.color, bg: c.bg, border: c.border }]),
    ['Other', { color: '#6b7280', bg: '#f9fafb', border: '#e5e7eb' }]
  ]);

  const items = Object.values(grouped);
  const byCategory = {};
  CATEGORY_ORDER.forEach(c => byCategory[c] = []);
  items.forEach(item => {
    const cat = getCategory(item.item);
    item.category = cat;
    byCategory[cat].push(item);
  });
  CATEGORY_ORDER.forEach(c => byCategory[c].sort((a,b) => a.item.localeCompare(b.item)));

  let itemIndex = 0;
  const categoryBlocks = CATEGORY_ORDER
    .filter(cat => byCategory[cat].length > 0)
    .map(cat => {
      const meta = CATEGORY_META[cat];
      return `
      <div style="margin-top:20px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <div style="background:${meta.bg};color:${meta.color};font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:5px 14px;border-radius:20px;border:1.5px solid ${meta.border};white-space:nowrap">${cat}</div>

      ${byCategory[cat].map(item => {
        const i = itemIndex++;
        // Prefer kitchen-unit totals (cups, tbsp, oz) over abstract store sizes
        let amtStr;
        if (item.kitchenAmts && Object.keys(item.kitchenAmts).length > 0) {
          const parts = Object.entries(item.kitchenAmts)
            .filter(([,v]) => v > 0.04)
            .map(([u,v]) => fmtKitchenAmt(v, u))
            .filter(Boolean);
          amtStr = parts.length > 0 ? parts.join(' + ') : toGroceryQuantity(item.item, item.amounts, item.category);
        } else {
          amtStr = toGroceryQuantity(item.item, item.amounts, item.category);
        }
        let displayName = item.item.charAt(0).toUpperCase() + item.item.slice(1);
        const isAsNeeded = amtStr === 'as needed';
        // If the unit in amtStr is just the item name itself (e.g. "2 cucumbers Cucumber"),
        // strip it from amtStr and use the correctly pluralized item name as displayName.
        if (!isAsNeeded && amtStr) {
          const itemLower = item.item.toLowerCase();
          const labelPart = amtStr.replace(/^[~≈\d\s¼½¾⅛⅓⅔.]+/, '').trim().toLowerCase();
          const exactMatch = labelPart && (labelPart === itemLower || labelPart === itemLower + 's');
          const suffixMatch = !exactMatch && labelPart && labelPart.length > 3 && itemLower.endsWith(' ' + labelPart);
          if (exactMatch || suffixMatch) {
            const labelRe = new RegExp('\\s*' + labelPart.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '$', 'i');
            amtStr = amtStr.replace(labelRe, '').trim();
            if (exactMatch) displayName = labelPart.charAt(0).toUpperCase() + labelPart.slice(1);
          }
        }
        const qtyPrefix = (!isAsNeeded && amtStr) ? `<span style="color:var(--text-2);font-weight:700;margin-right:6px">${amtStr}</span>` : '';
        const sourceLine = (isAsNeeded ? 'as needed' + (item.meals.length ? ' · ' : '') : '') + item.meals.join(', ');
        return `
        <div class="grocery-item" id="gi-${i}">
          <input type="checkbox" class="grocery-check" onchange="this.closest('.grocery-item').classList.toggle('checked',this.checked)">
          <div class="grocery-text">
            <span style="font-weight:600">${qtyPrefix}${displayName}</span>
            <span style="font-size:12px;color:var(--text-3);display:block">${sourceLine}</span>
          </div>
        </div>`;
      }).join('')}
    `;
    }).join('');

  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn btn-secondary btn-sm" onclick="weekState.groceryMode=false;render()">← Back to Week</button>
      <div style="font-size:20px;font-weight:800;flex:1">Grocery List</div>
      <button class="btn btn-secondary btn-sm" onclick="printGroceryList()">${IC.printer} Print</button>
    </div>
    <div class="grocery-wrap" id="grocery-list">
      ${items.length ? categoryBlocks : '<p style="color:var(--text-3);text-align:center;padding:20px">No meals planned yet.</p>'}
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--text-3);text-align:center">${items.length} items from your weekly meal plan</div>
  `;
}

function renderMealPrep(dates) {
  const entries = [];
  dates.forEach(d => {
    const plan = STATE.dailyPlans[d];
    if (!plan) return;
    const dayFull = new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    const dayShort = new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    plan.slots.forEach(slot => {
      if (slot.meal) entries.push({ date:d, dayFull, dayShort, label:slot.label, category:slot.category, meal:slot.meal });
    });
  });

  if (!entries.length) {
    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <button class="btn btn-secondary btn-sm" onclick="weekState.mealPrepMode=false;render()">← Back to Week</button>
        <div style="font-size:20px;font-weight:800;flex:1">Meal Prep Guide</div>
      </div>
      <p style="color:var(--text-3);text-align:center;padding:40px">No meals planned this week yet.</p>
    `;
  }

  function parseMin(t) { const m=(t||'').match(/(\d+)/); return m?parseInt(m[1]):0; }
  function fmtMin(n) { if(!n) return '0 min'; return n>=60?`${Math.floor(n/60)}h ${n%60>0?' '+n%60+'m':''}`.trim():`${n} min`; }

  // Group entries by meal name to find repeated meals (batch candidates)
  const mealGroups = {};
  entries.forEach(e => {
    const name = e.meal.name;
    if (!mealGroups[name]) mealGroups[name] = { meal: e.meal, occurrences: [] };
    mealGroups[name].occurrences.push({ dayShort: e.dayShort, label: e.label, date: e.date });
  });

  const batchMeals = Object.values(mealGroups)
    .filter(g => g.occurrences.length >= 2)
    .sort((a, b) => b.occurrences.length - a.occurrences.length);

  const singleMeals = Object.values(mealGroups)
    .filter(g => g.occurrences.length === 1)
    .sort((a, b) => parseMin(b.meal.cookTime) - parseMin(a.meal.cookTime));

  const allTasks = [...batchMeals, ...singleMeals];

  const totalPrepMin = entries.reduce((s,e)=>s+parseMin(e.meal.prepTime),0);
  const totalCookMin = entries.reduce((s,e)=>s+parseMin(e.meal.cookTime),0);

  const byDay = {};
  entries.forEach(e=>{
    if(!byDay[e.date]) byDay[e.date]={dayFull:e.dayFull,meals:[]};
    byDay[e.date].meals.push(e);
  });

  if (!weekState.prepChecked) weekState.prepChecked = {};
  const doneCount = allTasks.filter(g => weekState.prepChecked[g.meal.name]).length;
  const totalTasks = allTasks.length;

  // Scale ingredients by a count multiplier and return formatted strings
  function aggregateIngredients(meal, count) {
    return (meal.ingredients || []).map(ing => {
      const amount = parseFloat(ing.amount);
      if (!isNaN(amount) && amount > 0) {
        const total = amount * count;
        const totalStr = Number.isInteger(total) ? String(total) : total.toFixed(1).replace(/\.0$/, '');
        return `${totalStr}${ing.unit ? ' ' + ing.unit : ''} ${ing.item}`.trim();
      }
      return `${ing.amount ? ing.amount + ' ' : ''}${ing.unit ? ing.unit + ' ' : ''}${ing.item}`.trim();
    });
  }

  const batchSection = batchMeals.length ? `
    <div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text-1);display:flex;align-items:center;gap:6px">${IC.layers} Batch Make</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${batchMeals.map(({meal, occurrences}, i) => {
          const count = occurrences.length;
          const safeName = meal.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          const checked = !!weekState.prepChecked[meal.name];
          const aggedIngredients = aggregateIngredients(meal, count);
          const days = occurrences.map(o => `${o.dayShort} ${o.label}`).join(', ');
          const prepMin = parseMin(meal.prepTime);
          const cookMin = parseMin(meal.cookTime);
          return `
          <div style="${i>0?'border-top:1px solid var(--border)':''}">
            <label style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer${checked?';opacity:0.6':''}">
              <input type="checkbox" ${checked?'checked':''} onchange="weekState.prepChecked['${safeName}']=this.checked;render()" style="margin-top:3px;width:16px;height:16px;accent-color:var(--primary);cursor:pointer;flex-shrink:0">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span style="font-size:13px;font-weight:700;${checked?'text-decoration:line-through;color:var(--text-3)':''}">${meal.name}</span>
                  <span style="font-size:11px;font-weight:700;color:var(--primary);background:var(--primary-light);padding:1px 7px;border-radius:20px">×${count}</span>
                </div>
                <div style="font-size:11px;color:var(--text-2);margin-top:3px">${days}</div>
                ${aggedIngredients.length ? `
                  <div style="margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">
                    <div style="font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px;display:flex;align-items:center;gap:4px">${IC.lightbulb} Make all at once — total ingredients:</div>
                    <div style="display:flex;flex-wrap:wrap;gap:4px">
                      ${aggedIngredients.map(ing => `<span style="background:var(--card);border:1px solid var(--border);padding:2px 8px;border-radius:20px;font-size:11px;color:var(--text-1)">${ing}</span>`).join('')}
                    </div>
                  </div>
                ` : ''}
                <div style="font-size:11px;color:var(--text-2);margin-top:6px;display:flex;gap:8px">
                  ${prepMin?`<span>${IC.clock} ${meal.prepTime} prep each</span>`:''}
                  ${cookMin?`<span>${IC.pan} ${meal.cookTime} cook each</span>`:''}
                </div>
              </div>
            </label>
          </div>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  const singleSection = singleMeals.length ? `
    <div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text-1);display:flex;align-items:center;gap:6px">${IC.pan} Cook Fresh</div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        ${singleMeals.map(({meal, occurrences}, i) => {
          const safeName = meal.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          const checked = !!weekState.prepChecked[meal.name];
          const prepMin = parseMin(meal.prepTime);
          const cookMin = parseMin(meal.cookTime);
          const when = occurrences[0];
          return `<label style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;cursor:pointer;${i>0?'border-top:1px solid var(--border)':''}${checked?';opacity:0.55':''}">
            <input type="checkbox" ${checked?'checked':''} onchange="weekState.prepChecked['${safeName}']=this.checked;render()" style="margin-top:3px;width:16px;height:16px;accent-color:var(--primary);cursor:pointer;flex-shrink:0">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:600;${checked?'text-decoration:line-through;color:var(--text-3)':''}">${meal.name}</div>
              <div style="font-size:11px;color:var(--text-2);margin-top:3px;display:flex;flex-wrap:wrap;gap:8px">
                <span>${when.dayShort} ${when.label}</span>
                ${prepMin?`<span>${IC.clock} ${meal.prepTime} prep</span>`:''}
                ${cookMin?`<span>${IC.pan} ${meal.cookTime} cook</span>`:''}
              </div>
            </div>
          </label>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  const scheduleSection = `
    <div style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text-1);display:flex;align-items:center;gap:6px">${IC.calendar} This Week's Schedule</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${Object.entries(byDay).map(([,{dayFull,meals}])=>`
          <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px">
            <div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px">${dayFull}</div>
            ${meals.map(e=>`
              <div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px">
                <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-2);min-width:56px">${e.label}</span>
                <span style="font-weight:500;flex:1">${e.meal.name}</span>
                <span style="font-size:11px;color:var(--text-2)">${e.meal.calories} cal</span>
              </div>`).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;

  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <button class="btn btn-secondary btn-sm" onclick="weekState.mealPrepMode=false;render()">← Back to Week</button>
      <div style="font-size:20px;font-weight:800;flex:1">Meal Prep Guide</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--primary)">${entries.length}</div>

let savedFilters = { search:'', minCal:'', maxCal:'', minProtein:'' };

function renderSaved() {
  const filtered = STATE.savedMeals.filter(m => {
    if (savedFilters.search && !m.name.toLowerCase().includes(savedFilters.search.toLowerCase())) return false;
    if (savedFilters.minCal && m.calories < parseFloat(savedFilters.minCal)) return false;
    if (savedFilters.maxCal && m.calories > parseFloat(savedFilters.maxCal)) return false;
    if (savedFilters.minProtein && m.protein < parseFloat(savedFilters.minProtein)) return false;
    return true;
  });

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-size:20px;font-weight:800;letter-spacing:-.5px">Saved Meals</div>

    <div class="filter-row">
      <input class="filter-input" placeholder="Search..." style="flex:1;width:auto" value="${savedFilters.search}" oninput="savedFilters.search=this.value;renderSavedInPlace()">
      <input class="filter-input" type="number" placeholder="Min cal" value="${savedFilters.minCal}" oninput="savedFilters.minCal=this.value;renderSavedInPlace()">
      <input class="filter-input" type="number" placeholder="Max cal" value="${savedFilters.maxCal}" oninput="savedFilters.maxCal=this.value;renderSavedInPlace()">
      <input class="filter-input" type="number" placeholder="Min protein" value="${savedFilters.minProtein}" oninput="savedFilters.minProtein=this.value;renderSavedInPlace()">
    </div>

    <div id="saved-results">
      ${filtered.length ? `<div class="saved-grid">
        ${filtered.map(m => `
          <div class="saved-card" onclick="expandSavedMeal('${m.id}')">
            <div style="display:flex;align-items:start;justify-content:space-between">
              <div class="saved-card-name">${m.name}</div>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteSaved('${m.id}')" style="flex-shrink:0;margin-left:8px">✕</button>
            </div>
            ${m.description ? `<div class="saved-card-desc">${m.description}</div>` : ''}
            <div class="saved-card-chips">
              <span class="chip chip-cal">${IC.flame} ${m.calories} cal</span>
              <span class="chip chip-protein">${IC.protein} ${m.protein}g P</span>
              <span class="chip chip-carbs">${IC.grain} ${m.carbs}g C</span>
              <span class="chip chip-fat">${IC.droplet} ${m.fat}g F</span>
              ${m.category ? `<span class="chip" style="background:var(--surface-2);color:var(--text-2);font-size:10px;text-transform:capitalize">${m.category}</span>` : ''}
            </div>
            <div style="margin-top:8px"><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();addSavedToToday('${m.id}')">+ Add to today</button></div>
          </div>
        `).join('')}
      </div>` : `<div class="empty-state"><div class="icon" style="color:var(--text-3)">${IC.bookmark.replace('width="14" height="14"','width="40" height="40"')}</div><p>${STATE.savedMeals.length ? 'No meals match your filters' : 'Save meals from the Today view to see them here'}</p></div>`}
    </div>
  `;

function renderSavedInPlace() {
  const content = document.querySelector('.page-content');
  if (content) content.innerHTML = renderSaved();
}

function deleteSaved(id) {
  STATE.savedMeals = STATE.savedMeals.filter(m => m.id !== id);
  saveState();
  renderSavedInPlace();
  showToast('Meal removed');
}

function expandSavedMeal(id) {
  const meal = STATE.savedMeals.find(m => m.id === id);
  if (!meal) return;
  const modalHtml = `<div class="modal-overlay" id="meal-detail-modal" onclick="if(event.target.id==='meal-detail-modal')this.remove()">
    <div class="modal-sheet">
      ${renderRecipeCard(meal, id)}
      <div class="modal-actions">
        <button class="btn btn-secondary" style="flex:1" onclick="document.getElementById('meal-detail-modal').remove()">Close</button>
        <button class="btn btn-primary" style="flex:1" onclick="addSavedToToday('${id}');document.getElementById('meal-detail-modal').remove()">+ Add to today</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function addSavedToToday(mealId) {
  const meal = STATE.savedMeals.find(m => m.id === mealId);
  if (!meal) return;
  const dateStr = today();
  const plan = getOrCreatePlan(dateStr);
  if (wouldExceedCalorieLimit(dateStr, meal.calories || 0)) {
    showToast(`Can't add "${meal.name}" — would exceed daily calorie limit`, 3000);
    return;
  }
  const emptySlot = plan.slots.find(s => !s.meal && !s.open);
  if (emptySlot) {
    emptySlot.meal = { ...meal };
    saveState();
    showToast(`"${meal.name}" added to ${emptySlot.label}`);
    if (STATE.currentView === 'today') renderTodayInPlace(dateStr);
  } else {
    // Add a new slot
    const newSlot = { id: uid(), type:'meal', label:`Meal ${plan.slots.length+1}`, preference:'', meal: {...meal}, open: false };
    plan.slots.push(newSlot);
    saveState();
    showToast(`"${meal.name}" added as new meal slot`);
    if (STATE.currentView === 'today') renderTodayInPlace(dateStr);
  }
}

async function buildMealImportUrl() {
  const url = document.getElementById('bm-url')?.value.trim();
  if (!url) { showToast('Please enter a recipe URL'); return; }
  buildMealState.loading = true;
  renderBuildMealModal();
  try {
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();
    const html = data.contents || '';
    const parsed = parseRecipeFromHtml(html);
    if (!parsed) throw new Error('No recipe data found on this page');
    buildMealState.importedData = parsed;
    buildMealState.ingredients = parsed.ingredients.length
      ? parsed.ingredients.map(ing => ({ id: uid(), name: ing.name || ing, cal: ing.cal || '', p: ing.p || '', c: ing.c || '', f: ing.f || '' }))
      : [{ id: uid(), name: '', cal: '', p: '', c: '', f: '' }];
    if (parsed.totalCal && buildMealState.ingredients.every(i => !i.cal)) {
      buildMealState.ingredients = [{ id: uid(), name: 'Total (from recipe)', cal: parsed.totalCal, p: parsed.totalP || '', c: parsed.totalC || '', f: parsed.totalF || '' }];
    }
    buildMealState.loading = false;
    buildMealState.tab = 'manual';
    renderBuildMealModal();
    showToast('Recipe imported! Review and save.');
  } catch(err) {
    buildMealState.loading = false;
    renderBuildMealModal();
    showToast('Could not import recipe — try filling in manually.', 4000);
  }
}

function parseRecipeFromHtml(html) {
  try {
    const jsonLdMatches = [...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
    for (const match of jsonLdMatches) {
      let data;
      try { data = JSON.parse(match[1].trim()); } catch { continue; }
      const recipes = [].concat(data['@graph'] || data).filter(d => {
        const t = d['@type'];
        return t === 'Recipe' || (Array.isArray(t) && t.includes('Recipe'));
      });
      if (!recipes.length) continue;
      const r = recipes[0];
      const nutrition = r.nutrition || {};
      const parseNum = s => parseFloat((s || '').toString().replace(/[^\d.]/g, '')) || 0;
      const parseDuration = s => {
        if (!s) return '';
        const m = s.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
        if (!m) return s;
        const h = parseInt(m[1]||0), min = parseInt(m[2]||0);
        return h ? `${h}h ${min}min` : `${min} min`;
      };
      const rawIngs = r.recipeIngredient || [];
      const instructions = Array.isArray(r.recipeInstructions)
        ? r.recipeInstructions.map(s => typeof s === 'string' ? s : s.text || '').filter(Boolean).join('\n')
        : (typeof r.recipeInstructions === 'string' ? r.recipeInstructions : '');
      return {
        name: r.name || '',
        description: r.description || '',
        prepTime: parseDuration(r.prepTime),
        cookTime: parseDuration(r.cookTime),
        instructions,
        ingredients: rawIngs.map(s => ({ name: s, cal: '', p: '', c: '', f: '' })),
        totalCal: parseNum(nutrition.calories),
        totalP:   parseNum(nutrition.proteinContent),
        totalC:   parseNum(nutrition.carbohydrateContent),
        totalF:   parseNum(nutrition.fatContent)
      };
    }
  } catch(e) {}
  return null;
}

function buildMealAddIngredient() {
  const ing = { id: uid(), name: '', cal: '', p: '', c: '', f: '' };
  buildMealState.ingredients.push(ing);
  const row = `<div class="ing-row" id="ing-${ing.id}">
    <input placeholder="Ingredient name" value="" oninput="buildMealUpdateIngredient('${ing.id}','name',this.value)">
    <input type="number" placeholder="Cal" value="" oninput="buildMealUpdateIngredient('${ing.id}','cal',this.value);buildMealRecalc()">
    <input type="number" placeholder="P" value="" oninput="buildMealUpdateIngredient('${ing.id}','p',this.value);buildMealRecalc()">
    <input type="number" placeholder="C" value="" oninput="buildMealUpdateIngredient('${ing.id}','c',this.value);buildMealRecalc()">
    <input type="number" placeholder="F" value="" oninput="buildMealUpdateIngredient('${ing.id}','f',this.value);buildMealRecalc()">
    <button class="ing-del" onclick="buildMealRemoveIngredient('${ing.id}')">✕</button>
  </div>`;
  const list = document.getElementById('bm-ing-list');
  if (list) {
    list.insertAdjacentHTML('beforeend', row);
    list.lastElementChild?.querySelector('input')?.focus();
  }
}

function buildMealRemoveIngredient(ingId) {
  if (buildMealState.ingredients.length <= 1) { showToast('Need at least one ingredient row'); return; }
  buildMealState.ingredients = buildMealState.ingredients.filter(i => i.id !== ingId);
  document.getElementById('ing-' + ingId)?.remove();
  buildMealRecalc();
}

function buildMealSwitchPanel(panel) {
  buildMealState.tab = panel;
  document.getElementById('bm-url-panel').style.display = panel === 'url' ? '' : 'none';
  document.getElementById('bm-manual-panel').style.display = panel === 'manual' ? '' : 'none';
  if (panel === 'url') setTimeout(() => document.getElementById('bm-url')?.focus(), 50);
  else setTimeout(() => document.getElementById('bm-name')?.focus(), 50);
}

function buildMealUpdateIngredient(ingId, field, value) {
  const ing = buildMealState.ingredients.find(i => i.id === ingId);
  if (ing) ing[field] = value;
}

function buildMealRecalc() {
  const totals = buildMealState.ingredients.reduce((acc, ing) => ({
    cal: acc.cal + (parseFloat(ing.cal)||0),
    p:   acc.p   + (parseFloat(ing.p)||0),
    c:   acc.c   + (parseFloat(ing.c)||0),
    f:   acc.f   + (parseFloat(ing.f)||0)
  }), { cal:0, p:0, c:0, f:0 });
  const el = id => document.getElementById(id);
  if (el('bt-cal')) el('bt-cal').textContent = Math.round(totals.cal);
  if (el('bt-p'))   el('bt-p').textContent   = Math.round(totals.p);
  if (el('bt-c'))   el('bt-c').textContent   = Math.round(totals.c);
  if (el('bt-f'))   el('bt-f').textContent   = Math.round(totals.f);
}

function buildMealSave() {
  const name = document.getElementById('bm-name')?.value.trim();
  if (!name) { showToast('Please enter a meal name'); return; }
  const ings = buildMealState.ingredients;
  const totals = ings.reduce((acc, ing) => ({
    cal: acc.cal + (parseFloat(ing.cal)||0),
    p:   acc.p   + (parseFloat(ing.p)||0),
    c:   acc.c   + (parseFloat(ing.c)||0),
    f:   acc.f   + (parseFloat(ing.f)||0)
  }), { cal:0, p:0, c:0, f:0 });
  if (STATE.savedMeals.some(m => m.name.toLowerCase() === name.toLowerCase())) {
    showToast('A meal with this name already exists'); return;
  }
  const ingredients = ings.filter(i => i.name.trim()).map(i => ({ name: i.name, amount: '', cal: parseFloat(i.cal)||0, p: parseFloat(i.p)||0, c: parseFloat(i.c)||0, f: parseFloat(i.f)||0 }));
  const cat = document.getElementById('bm-cat')?.value || buildMealState.category || 'dinner';
  const meal = {
    id: uid(), name,
    description: document.getElementById('bm-desc')?.value.trim() || '',
    prepTime: document.getElementById('bm-prep')?.value.trim() || '',
    cookTime: document.getElementById('bm-cook')?.value.trim() || '',
    instructions: document.getElementById('bm-inst')?.value.trim() || '',
    calories: Math.round(totals.cal),
    protein:  Math.round(totals.p),
    carbs:    Math.round(totals.c),
    fat:      Math.round(totals.f),
    ingredients,
    category: cat,
    mealTypes: [cat]
  };
  STATE.savedMeals.push(meal);
  saveState();
  document.getElementById('build-meal-modal')?.remove();
  renderSavedInPlace();
  showToast(`"${name}" saved to library ✓`);
}

function bindSettings() {
  document.querySelectorAll('#s-macro-grid [data-field]').forEach(input => {
    input.addEventListener('change', () => {
      const field = input.dataset.field;
      const cur = {
        calories: parseFloat(document.getElementById('sm-calories').value)||STATE.profile.calories,
        protein: parseFloat(document.getElementById('sm-protein').value)||STATE.profile.protein,
        carbs: parseFloat(document.getElementById('sm-carbs').value)||STATE.profile.carbs,
        fat: parseFloat(document.getElementById('sm-fat').value)||STATE.profile.fat
      };
      const updated = adjustMacros(field, input.value, cur);
      ['calories','protein','carbs','fat'].forEach(f => {
        const el = document.getElementById(`sm-${f}`);
        if (el && el !== input) el.value = updated[f];
      });
    });
  });

  document.getElementById('save-settings-btn')?.addEventListener('click', () => {
    STATE.profile.name = document.getElementById('s-name')?.value || STATE.profile.name;
    STATE.profile.age = parseInt(document.getElementById('s-age')?.value) || STATE.profile.age;
    STATE.profile.sex = document.getElementById('s-sex')?.value || STATE.profile.sex;
    STATE.profile.weightLbs = parseFloat(document.getElementById('s-weight')?.value) || STATE.profile.weightLbs;
    STATE.profile.calories = parseFloat(document.getElementById('sm-calories')?.value) || STATE.profile.calories;
    STATE.profile.protein = parseFloat(document.getElementById('sm-protein')?.value) || STATE.profile.protein;
    STATE.profile.carbs = parseFloat(document.getElementById('sm-carbs')?.value) || STATE.profile.carbs;
    STATE.profile.fat = parseFloat(document.getElementById('sm-fat')?.value) || STATE.profile.fat;
    saveState();
    showToast('Settings saved ✓');
  });
}

function settingsToggleChip(type, value, el) {
  if (type === 'dietary') {
    if (!STATE.dietaryRestrictions) STATE.dietaryRestrictions = [];
    const idx = STATE.dietaryRestrictions.indexOf(value);
    if (idx >= 0) { STATE.dietaryRestrictions.splice(idx, 1); el.classList.remove('active'); }
    else { STATE.dietaryRestrictions.push(value); el.classList.add('active'); }
  } else {
    if (!STATE.allergies) STATE.allergies = [];
    const idx = STATE.allergies.indexOf(value);
    if (idx >= 0) { STATE.allergies.splice(idx, 1); el.classList.remove('active'); }
    else { STATE.allergies.push(value); el.classList.add('active'); }
  }
  saveState();
  showToast(value + (el.classList.contains('active') ? ' enabled' : ' removed'));
}

function recalcTDEE() {
  const newMacros = calcTDEE(STATE.profile);
  ['calories','protein','carbs','fat'].forEach(f => {
    const el = document.getElementById(`sm-${f}`);
    if (el) el.value = newMacros[f];
  });
  showToast('Recalculated from your profile');
}

function deleteFixedItemSettings(id) {
  STATE.fixedItems = STATE.fixedItems.filter(f => f.id !== id);
  saveState();
  const content = document.querySelector('.page-content');
  if (content) content.innerHTML = renderSettings();
  bindSettings();
}

function startSpeech(inputId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Speech recognition not supported in this browser'); return; }
  const rec = new SR();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  const btn = document.querySelector(`[data-mic-for="${inputId}"]`);
  if (btn) btn.classList.add('listening');
  rec.start();
  rec.onresult = e => {
    const text = e.results[0][0].transcript;
    const input = document.getElementById(inputId);
    if (input) { input.value = text; input.dispatchEvent(new Event('input')); }
    if (btn) btn.classList.remove('listening');
  };
  rec.onerror = () => { if (btn) btn.classList.remove('listening'); showToast('Could not hear — try again'); };
  rec.onend = () => { if (btn) btn.classList.remove('listening'); };
}

  document.getElementById('add-fixed-lookup-modal')?.remove();

    inner = `

    inner = `
      ${statusBanner}
      <div class="form-group"><label class="form-label">Name</label>
        <input class="form-input" id="afl-confirm-name" value="${foodName}" placeholder="e.g. Protein Shake"></div>

      <div class="modal-actions">
        <button class="btn btn-secondary" style="flex:1" onclick="fixedItemLookupState.phase=1;renderAddFixedLookupModal()">← Back</button>
        <button class="btn btn-primary" style="flex:1" onclick="confirmAddFixedFromLookup()">Add Item ✓</button>
      </div>`;
  }
  const html = `<div class="modal-overlay" id="add-fixed-lookup-modal" onclick="if(event.target.id==='add-fixed-lookup-modal')this.remove()">
    <div class="modal-sheet">
      <div class="modal-title">Add pre-logged item</div>
      <div class="modal-sub">${phase === 1 ? 'Search for a food to auto-fill its macros.' : `${foodName} · ${amount}`}</div>
      ${inner}
    </div>
  </div>`;

    setTimeout(() => document.getElementById('afl-name')?.focus(), 80);
    const nameEl = document.getElementById('afl-name');
    const amtEl = document.getElementById('afl-amount');
    if (nameEl && amtEl) {

      amtEl.addEventListener('keydown', e => { if (e.key === 'Enter') lookupFixedFood(); });
    }

    setTimeout(() => {
      const m = fixedItemLookupState.macros;
      const el = id => document.getElementById(id);

  }

function lookupFixedFood() {
  const name = document.getElementById('afl-name')?.value.trim();
  const amount = document.getElementById('afl-amount')?.value.trim();
  if (!name) { showToast('Please enter a food name'); return; }
  if (!amount) { showToast('Please enter an amount (e.g. 100g, 1 scoop)'); return; }
  fixedItemLookupState.foodName = name;
  fixedItemLookupState.amount = amount;
  fixedItemLookupState.phase = 2;
  const result = lookupFood(name, amount);
  fixedItemLookupState.found = !!result;
  fixedItemLookupState.macros = result;
  renderAddFixedLookupModal();
}

function lookupFood(name, amountStr) {
  const lower = name.toLowerCase().trim();
  let matched = null;
  for (const f of FOOD_DB) {
    if (f.names.some(n => lower.includes(n) || n.includes(lower.replace(/s$/, '')))) {
      matched = f;
      break;
    }
  }
  if (!matched) return null;

  const a = amountStr.trim();
  let grams = 0;
  const mG   = a.match(/^([\d.]+)\s*g(?:rams?)?$/i);
  const mOz  = a.match(/^([\d.]+)\s*oz(?:ounces?)?$/i);
  const mMl  = a.match(/^([\d.]+)\s*ml$/i);
  const mLbs = a.match(/^([\d.]+)\s*lbs?$/i);
  const mKg  = a.match(/^([\d.]+)\s*kg$/i);
  const mNum = a.match(/^([\d.]+)$/);
  if (mG)   grams = parseFloat(mG[1]);
  else if (mOz)  grams = parseFloat(mOz[1]) * 28.35;
  else if (mMl)  grams = parseFloat(mMl[1]);
  else if (mLbs) grams = parseFloat(mLbs[1]) * 453.6;
  else if (mKg)  grams = parseFloat(mKg[1]) * 1000;
  else if (mNum) grams = parseFloat(mNum[1]);
  else return null;

  const s = grams / 100;
  return {
    cal: Math.round(matched.per100.cal * s),
    p: Math.round(matched.per100.p * s * 10) / 10,
    c: Math.round(matched.per100.c * s * 10) / 10,
    f: Math.round(matched.per100.f * s * 10) / 10
  };
}

}

  document.getElementById('log-food-modal')?.remove();
  const { phase, tab, found, foodName, amount, dateStr } = logFoodState;

  const tabs = `<div class="modal-tabs">
    <button class="modal-tab ${tab!=='saved'?'active':''}" onclick="logFoodState.tab='search';logFoodState.phase=1;renderLogFoodModal()">Search food</button>

  let inner = '';

    const meals = STATE.savedMeals;
    inner = meals.length ? `

      ${statusBanner}
      <div class="form-row-3">
        <div><label class="form-label" style="font-size:11px">Calories</label><input class="form-input" id="lf-cal" type="number" placeholder="0" min="0"></div>
        <div><label class="form-label" style="font-size:11px">Protein (g)</label><input class="form-input" id="lf-prot" type="number" placeholder="0" min="0"></div>
        <div><label class="form-label" style="font-size:11px">Carbs (g)</label><input class="form-input" id="lf-carbs" type="number" placeholder="0" min="0"></div>
      </div>
      <div style="margin-top:10px"><label class="form-label" style="font-size:11px">Fat (g)</label>
        <input class="form-input" id="lf-fat" type="number" placeholder="0" min="0" style="max-width:120px"></div>

      </div>`;

    <div class="modal-sheet">
      <div class="modal-title">Log a food</div>
      <div class="modal-sub">${subText}</div>
      ${tabs}

  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  if (tab !== 'saved' && phase === 1) {
    setTimeout(() => document.getElementById('lf-name')?.focus(), 80);

    if (nameEl && amtEl) {
      nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') amtEl.focus(); });

    }

      const m = logFoodState.macros;

      if (el('lf-prot'))  el('lf-prot').value  = m.p;
      if (el('lf-carbs')) el('lf-carbs').value = m.c;
      if (el('lf-fat'))   el('lf-fat').value   = m.f;
    }, 50);
  } else if (tab !== 'saved') {
    setTimeout(() => document.getElementById('lf-cal')?.focus(), 80);
  }
}

function lookupLogFood() {
  const name   = document.getElementById('lf-name')?.value.trim();
  const amount = document.getElementById('lf-amount')?.value.trim();
  if (!name)   { showToast('Please enter a food name'); return; }
  if (!amount) { showToast('Please enter an amount (e.g. 100g, 2oz)'); return; }
  logFoodState.foodName = name;
  logFoodState.amount   = amount;
  logFoodState.phase    = 2;
  const result = lookupFood(name, amount);
  logFoodState.found  = !!result;
  logFoodState.macros = result;
  renderLogFoodModal();
}

function addLoggedFood(dateStr) {
  const name = logFoodState.foodName || document.getElementById('lf-name')?.value.trim();
  if (!name) { showToast('Please enter a food name'); return; }
  const newCalories = parseFloat(document.getElementById('lf-cal')?.value) || 0;
  const plan = getOrCreatePlan(dateStr);
  if (wouldExceedCalorieLimit(dateStr, newCalories)) {
    showToast("Can't log food — would exceed daily calorie limit", 3000);
    return;
  }
  if (!plan.loggedFoods) plan.loggedFoods = [];
  plan.loggedFoods.push({
    id: uid(),
    name,
    calories: newCalories,
    protein: parseFloat(document.getElementById('lf-prot')?.value) || 0,
    carbs: parseFloat(document.getElementById('lf-carbs')?.value) || 0,
    fat: parseFloat(document.getElementById('lf-fat')?.value) || 0
  });
  saveState();
  document.getElementById('log-food-modal')?.remove();
  renderTodayInPlace(dateStr);
  showToast('Food logged ✓');
}

function removeLoggedFood(dateStr, foodId) {
  const plan = STATE.dailyPlans[dateStr];
  if (!plan) return;
  plan.loggedFoods = (plan.loggedFoods || []).filter(f => f.id !== foodId);
  saveState();
  renderTodayInPlace(dateStr);
}

function addSavedAsLoggedFood(mealId, dateStr) {
  const meal = STATE.savedMeals.find(m => m.id === mealId);
  if (!meal) return;
  const plan = getOrCreatePlan(dateStr);
  if (wouldExceedCalorieLimit(dateStr, meal.calories || 0)) {
    showToast(`Can't log "${meal.name}" — would exceed daily calorie limit`, 3000);
    return;
  }
  if (!plan.loggedFoods) plan.loggedFoods = [];
  plan.loggedFoods.push({ id: uid(), name: meal.name, calories: meal.calories || 0, protein: meal.protein || 0, carbs: meal.carbs || 0, fat: meal.fat || 0 });
  saveState();
  document.getElementById('log-food-modal')?.remove();
  renderTodayInPlace(dateStr);
  showToast(`"${meal.name}" logged ✓`);
}

function resetDailyPlan() {
  if (!confirm("Reset today's meal plan? Meal slots and logged foods will be cleared.")) return;
  const dateStr = today();
  STATE.dailyPlans[dateStr] = { slots: defaultSlots(), approved: false, loggedFoods: [] };
  saveState();
  render();
  showToast("Today's meal plan reset");
}

function resetWeeklyPlan() {
  if (!confirm('This will clear all meal plans for this week and remove your weekly template. Are you sure?')) return;
  const dates = getWeekDates();
  dates.forEach(d => {
    const loggedFoods = STATE.dailyPlans[d]?.loggedFoods || [];
    STATE.dailyPlans[d] = { slots: defaultSlots(), approved: false, loggedFoods };
  });
  STATE.weeklyTemplate = null;
  _weekPlanSaved = false;
  saveState();
  render();
  showToast('Weekly plan reset');
}

function saveAsWeeklyTemplate() {
  const dates = getWeekDates();
  const template = {};
  dates.forEach(d => {
    const dayOfWeek = new Date(d + 'T12:00').getDay();
    const plan = STATE.dailyPlans[d];
    template[dayOfWeek] = plan
      ? plan.slots.map(s => ({ ...s, id: uid(), seenNames: [] }))
      : defaultSlots();
  });
  STATE.weeklyTemplate = template;
  saveState();
  showToast('Weekly template saved! Meals will auto-apply at midnight each day.');
}

function clearWeeklyTemplate() {
  if (!confirm('Remove the weekly template? Midnight auto-update will reset to empty defaults instead.')) return;
  STATE.weeklyTemplate = null;
  saveState();
  const content = document.querySelector('.page-content');
  if (content) { content.innerHTML = renderSettings(); bindSettings(); }
  showToast('Weekly template removed');
}

function applyTemplateForDate(dateStr) {
  const dayOfWeek = new Date(dateStr + 'T12:00').getDay();
  const loggedFoods = STATE.dailyPlans[dateStr]?.loggedFoods || [];
  if (STATE.weeklyTemplate && STATE.weeklyTemplate[dayOfWeek]) {
    const slots = STATE.weeklyTemplate[dayOfWeek].map(s => ({ ...s, id: uid() }));
    STATE.dailyPlans[dateStr] = { slots, approved: false, loggedFoods };
  } else {
    STATE.dailyPlans[dateStr] = { slots: defaultSlots(), approved: false, loggedFoods };
  }
  saveState();
}

function checkMidnightReset() {
  const currentDate = today();
  if (currentDate !== lastKnownDate) {
    lastKnownDate = currentDate;
    applyTemplateForDate(currentDate);
    if (STATE.currentView === 'today') render();
    showToast(STATE.weeklyTemplate ? 'New day! Weekly plan applied.' : 'New day! Daily plan reset.');
  }
}

function resetApp() {
  if (!confirm('This will delete all your data including meal history and saved meals. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  STATE = defaultState();
  weekState = { activeDay: null, groceryMode: false, mealPrepMode: false, prepChecked: {} };
  savedFilters = { search:'', minCal:'', maxCal:'', minProtein:'' };
  tempMacros = {};
  render();
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nommie | Your Meal Bestie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" id="app-favicon" type="image/svg+xml" href="">
<style>
:root {
  --primary: #7ec8a8; --primary-hover: #68b896; --primary-light: #e5f8f0; --primary-dark: #4da880;
  --accent: #f5a888; --accent-light: #fff3ee;
  --protein: #a89ee8; --carbs: #f0c060; --fat: #f090b4;
  --bg: #f0f4ff; --surface: #ffffff; --surface-2: #e8eeff;
  --border: #d4dcf2; --border-focus: #7ec8a8;
  --text: #282018; --text-2: #6b5f58; --text-3: #b0a49c;
  --radius: 16px; --radius-sm: 10px; --radius-lg: 22px;
  --shadow: 0 2px 8px rgba(0,0,0,0.05),0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.07);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw}
button{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;outline:none}
input,select,textarea{font-family:'Plus Jakarta Sans',sans-serif;outline:none}
a{color:inherit;text-decoration:none}

/* ── Layout ── */
#app{min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;max-width:100vw}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.nav-bar.top{position:fixed;top:0;bottom:auto;border-top:none;border-bottom:1px solid var(--border);padding:0;overflow:hidden}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;color:var(--text-3);font-size:11px;font-weight:500;transition:color .2s}
.nav-item.active{color:var(--primary)}
.nav-item svg{width:22px;height:22px}
.hamburger-btn{display:none;margin-left:auto;padding:8px 14px;align-items:center;justify-content:center;background:none;color:var(--text);flex-shrink:0}
.mobile-nav-dropdown{display:none;position:fixed;top:0;right:0;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 0 var(--radius);z-index:200;min-width:160px;box-shadow:0 4px 16px rgba(0,0,0,.1);flex-direction:column}
.mobile-nav-dropdown.open{display:flex}
.mobile-nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;background:none;color:var(--text-2);font-size:14px;font-weight:500;width:100%;text-align:left;transition:color .2s}
.mobile-nav-item:not(:last-child){border-bottom:1px solid var(--border)}
.mobile-nav-item.active{color:var(--primary)}
.mobile-nav-item svg{width:18px;height:18px;flex-shrink:0}
.page-content{flex:1;padding:16px;padding-bottom:90px;max-width:680px;margin:0 auto;width:100%}
.page-content.with-topnav{padding-top:72px}

/* ── Onboarding ── */
.onboard-wrap{min-height:100vh;display:flex;flex-direction:column;background:linear-gradient(160deg,#f0f4ff 0%,#e5f8f0 100%)}
.onboard-header{padding:48px 24px 24px;text-align:center}
.onboard-logo{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.onboard-body{flex:1;padding:0 24px 32px;max-width:500px;margin:0 auto;width:100%}
.step-indicator{display:flex;gap:6px;justify-content:center;margin-bottom:32px}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.step-dot.active{background:var(--primary);width:24px;border-radius:4px}
.step-dot.done{background:var(--primary)}
.step-title{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.step-sub{color:var(--text-2);font-size:15px;margin-bottom:28px;line-height:1.5}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;background:var(--surface);color:var(--text);transition:border-color .2s}
.form-input:focus{border-color:var(--primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.radio-group{display:grid;gap:10px}
.radio-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;background:var(--surface)}
.radio-card:hover{border-color:var(--primary);background:var(--primary-light)}
.radio-card.selected{border-color:var(--primary);background:var(--primary-light)}
.radio-card-icon{font-size:22px}
.radio-card-text .title{font-weight:600;font-size:14px}
.radio-card-text .sub{font-size:12px;color:var(--text-2)}
.btn{padding:14px 24px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-primary:hover{background:var(--primary-hover)}
.btn-secondary{background:var(--surface-2);color:var(--text-2);border:2px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:6px}
.btn-danger{background:#fef2f2;color:#ef4444;border:2px solid #fecaca}
.btn-danger:hover{background:#ef4444;color:#fff}
.btn-ghost{background:none;color:var(--text-2);font-size:14px;padding:8px}
.btn-ghost:hover{color:var(--primary)}
.nav-btns{display:flex;gap:10px;margin-top:24px}
.macro-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.macro-field{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px;transition:border-color .2s}
.macro-field:focus-within{border-color:var(--primary)}
.macro-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-3);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.macro-field .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.macro-field input{width:100%;border:none;font-size:22px;font-weight:700;color:var(--text);background:none;padding:0}
.macro-field .unit{font-size:13px;color:var(--text-3);margin-top:2px}
.macro-field.calories{grid-column:1/-1;background:linear-gradient(135deg,var(--primary-light),#d8f0e8)}
.macro-field.calories input{color:var(--primary);font-size:28px}

/* ── Cards & Surfaces ── */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;border:1px solid var(--border)}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.chip-cal{background:#fef3eb;color:#9a3412}
.chip-protein{background:#ede9fe;color:#3730a3}
.chip-carbs{background:#fef9c3;color:#7c4700}
.chip-fat{background:#fce7f3;color:#9d174d}

/* ── Macro Ring ── */
.summary-section{background:linear-gradient(135deg,#7ec8a8,#4da880);border-radius:var(--radius-lg);padding:20px;color:#fff;margin-bottom:16px}
.summary-top{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.ring-text .cals{font-size:20px;font-weight:800;line-height:1}
.ring-text .of{font-size:10px;opacity:.8;margin-top:2px}
.summary-right{flex:1}
.summary-right .label{font-size:12px;opacity:.8;margin-bottom:4px}
.summary-right .big-num{font-size:28px;font-weight:800;line-height:1}
.summary-right .sub{font-size:12px;opacity:.7;margin-top:2px}
.macro-bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.macro-bar-item label{font-size:11px;font-weight:600;opacity:.85;margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.macro-bar-track{height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:3px;background:#fff;transition:width .4s ease}
.macro-bar-nums{font-size:12px;margin-top:3px;opacity:.9}

/* ── Fixed Items ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:14px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.7px}
.fixed-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px}
.fixed-item-toggle{position:relative;width:38px;height:22px;flex-shrink:0}
.fixed-item-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{display:block;width:100%;height:100%;background:#e2e8f0;border-radius:11px;cursor:pointer;transition:background .2s}
.fixed-item-toggle input:checked + .toggle-track{background:var(--primary)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.fixed-item-toggle input:checked ~ .toggle-thumb{transform:translateX(16px)}
.fixed-item-info{flex:1}
.fixed-item-name{font-size:14px;font-weight:600}
.fixed-item-macros{font-size:12px;color:var(--text-3)}
.fixed-item-inactive{opacity:.4}

/* ── Meal Slots ── */
.meal-slot{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
.slot-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.slot-title{font-size:15px;font-weight:700}
.slot-target{font-size:12px;color:var(--text-3)}
.slot-actions{display:flex;gap:6px;align-items:center}
.slot-body{padding:0 16px 14px}
.slot-empty{display:flex;gap:8px;align-items:center}
.pref-input{flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;color:var(--text);background:var(--surface-2)}
.pref-input:focus{border-color:var(--primary);background:#fff}
.btn-generate{background:var(--primary);color:#fff;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;white-space:nowrap}
.btn-generate:hover{background:var(--primary-hover)}
.btn-generate:disabled{opacity:.6;cursor:not-allowed}
.slot-open-badge{display:inline-flex;align-items:center;gap:6px;background:#fef9c3;color:#854d0e;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600}

/* ── Recipe Card ── */
.recipe-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.recipe-header{padding:14px 16px;background:linear-gradient(135deg,var(--primary-light),#e8f4ed);border-bottom:1px solid var(--border)}
.recipe-name{font-size:16px;font-weight:700;margin-bottom:6px}
.recipe-desc{font-size:13px;color:var(--text-2);line-height:1.5}
.recipe-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.recipe-macro-chips{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border)}
.recipe-time{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:4px}
.recipe-section{padding:12px 16px}
.recipe-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);margin-bottom:8px}
.ingredient-list{list-style:none;display:flex;flex-direction:column;gap:0}
.ingredient-list li{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.ingredient-list li:last-child{border-bottom:none}
.ing-row{display:flex;align-items:center;gap:6px}
.ing-name{flex:1;font-size:13px;color:var(--text)}
.ingredient-amount{color:var(--text-2);font-weight:500;font-size:12px;margin-right:4px}
.ing-macros{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
.ing-mac-chip{font-size:10px;font-weight:600;padding:1px 5px;border-radius:10px;white-space:nowrap}
.imc-cal{background:#fef3eb;color:#9a3412}
.imc-p{background:#ede9fe;color:#3730a3}
.imc-c{background:#fef9c3;color:#7c4700}
.imc-f{background:#fce7f3;color:#9d174d}

/* ── Logged Foods ── */
.logged-food-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:6px}
.logged-food-info{flex:1}
.logged-food-name{font-size:14px;font-weight:600}
.logged-food-macros{font-size:12px;color:var(--text-3)}
.btn-remove-log{background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
.btn-remove-log:hover{color:#ef4444}
.instruction-list{list-style:none;counter-reset:steps;display:flex;flex-direction:column;gap:8px}
.instruction-list li{counter-increment:steps;display:flex;gap:10px;font-size:13px;line-height:1.5;color:var(--text-2)}
.instruction-list li::before{content:counter(steps);background:var(--primary);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.recipe-footer{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--border);background:var(--surface-2)}
.collapsible-toggle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--primary);cursor:pointer;background:none;border:none;padding:0 0 4px}
.collapsible-content{overflow:hidden;transition:max-height .3s ease}

/* ── Loading Spinner ── */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.spinner-dark{border-color:rgba(0,0,0,.1);border-top-color:var(--primary)}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:12px;color:var(--text-2);font-size:14px}

/* ── Week View ── */
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.day-card{background:var(--surface);border-radius:var(--radius);border:2px solid var(--border);padding:14px;cursor:pointer;transition:all .2s}
.day-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md)}
.day-card.active{border-color:var(--primary);background:var(--primary-light)}
.day-card.planned{border-color:#86efac}
.day-card.past{opacity:.55;filter:grayscale(.3)}
.day-name{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px}
.day-date{font-size:12px;color:var(--text-3);margin-bottom:8px}
.day-cals{font-size:20px;font-weight:800;color:var(--primary)}
.day-status{font-size:12px;margin-top:4px}
.day-status.planned{color:#059669}
.day-status.partial{color:#d97706}
.day-status.none{color:var(--text-3)}
.day-detail{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:16px}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}

/* ── Saved Meals ── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.filter-input{padding:8px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;width:120px}
.filter-input:focus{border-color:var(--primary)}
.saved-grid{display:grid;gap:10px}
.saved-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px;cursor:pointer;transition:all .2s}
.saved-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary)}
.saved-card-name{font-size:15px;font-weight:700;margin-bottom:6px}
.saved-card-desc{font-size:12px;color:var(--text-2);margin-bottom:8px;line-height:1.4}
.saved-card-chips{display:flex;gap:6px;flex-wrap:wrap}

/* ── Settings ── */
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-2);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.fixed-item-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:8px}
.fixed-item-row .name{font-size:14px;font-weight:600;flex:1}
.fixed-item-row .macros{font-size:12px;color:var(--text-3)}

/* ── Grocery List ── */
.grocery-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.grocery-day{margin-bottom:14px}
.grocery-day-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px}
.grocery-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px}
.grocery-item:last-child{border-bottom:none}
.grocery-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0}
.grocery-item.checked .grocery-text{text-decoration:line-through;color:var(--text-3)}

/* ── Modals & Overlays ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s ease;overflow:hidden}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;max-height:90vh;overflow-y:auto;overflow-x:hidden;width:100%;max-width:680px;margin:0 auto;animation:slideUp .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px)}to{transform:translateY(0)}}
.modal-title{font-size:20px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:14px;color:var(--text-2);margin-bottom:20px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--surface-2);color:var(--text-2);border:2px solid var(--border);cursor:pointer;transition:all .2s}
.pill:hover,.pill.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-3)}
.empty-state .icon{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:14px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:var(--surface-2);color:var(--text-2)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;animation:toastIn .3s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Responsive ── */
@media(min-width:500px){.week-grid{grid-template-columns:repeat(4,1fr)}.form-row{grid-template-columns:1fr 1fr 1fr}}

/* ── Forma brand polish ── */
.onboard-logo span{font-weight:800;letter-spacing:-0.5px}
.step-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.section-title{font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:1px}
.slot-title{font-size:14px;font-weight:700;letter-spacing:-0.2px}
.recipe-name{font-size:15px;font-weight:700;letter-spacing:-0.3px}
.day-card{transition:all .15s}
.form-input{border-radius:var(--radius-sm);transition:border-color .15s,box-shadow .15s}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(94,144,128,0.12)}
.btn-primary{background:var(--primary);letter-spacing:0.1px}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-generate{background:var(--primary);border-radius:var(--radius-sm)}
.btn-generate:hover{background:var(--primary-hover)}
.meal-slot{transition:box-shadow .15s}
.meal-slot:hover{box-shadow:var(--shadow-md)}
.week-meal-link:hover{text-decoration:underline;cursor:pointer}
.saved-card:hover{border-color:var(--primary)}
.radio-card.selected{border-color:var(--primary);background:var(--primary-light)}
.radio-card:hover{border-color:var(--primary)}

/* ── Modal Tabs ── */
.modal-tabs{display:flex;gap:0;margin-bottom:18px;border:2px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.modal-tab{flex:1;padding:8px 12px;font-size:13px;font-weight:600;background:none;color:var(--text-2);border:none;cursor:pointer;transition:all .2s}
.modal-tab.active{background:var(--primary);color:#fff}

/* ── Ingredient Row ── */
.ing-row{display:grid;grid-template-columns:1fr 56px 48px 48px 48px 32px;gap:4px;align-items:center;margin-bottom:6px}
.ing-row input{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;width:100%}
.ing-row input:focus{border-color:var(--primary);outline:none}
.ing-del{background:none;border:none;color:var(--text-3);font-size:16px;cursor:pointer;padding:0;line-height:1}
.ing-del:hover{color:#e53e3e}
.ing-header{display:grid;grid-template-columns:1fr 56px 48px 48px 48px 32px;gap:4px;margin-bottom:4px}
.ing-header span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3)}
.ing-totals{display:grid;grid-template-columns:1fr 56px 48px 48px 48px 32px;gap:4px;padding:8px 0;border-top:2px solid var(--border);margin-top:4px}
.ing-totals span{font-size:12px;font-weight:700;color:var(--text)}
.saved-pill{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .15s}
.saved-pill:hover{border-color:var(--primary);background:var(--primary-light)}

/* ── Background Bubbles ── */
#bg-bubbles{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bbub{position:absolute;border-radius:50%;animation:bubFloat ease-in-out infinite}
@keyframes bubFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.06)}}

/* ── Drag & Drop ── */
.meal-slot[draggable]{cursor:default}
.drag-handle{cursor:grab;color:var(--text-3);padding:2px 6px;font-size:16px;line-height:1;flex-shrink:0;touch-action:none}
.drag-handle:active{cursor:grabbing}
.meal-slot.dragging{opacity:.45;box-shadow:none}
.meal-slot.drag-over{outline:2.5px dashed var(--primary);outline-offset:2px}

/* ── Mobile Reorder Arrows ── */
.slot-reorder-btns{display:none;flex-direction:column;gap:3px;flex-shrink:0;margin-right:4px}
.btn-reorder{background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--text-2);font-size:12px;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;line-height:1}
.btn-reorder:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
@media(max-width:499px){
  .hamburger-btn{display:flex}
  .nav-item{display:none}
  .nav-bar.top > div:first-child{border-right:none}
  .slot-reorder-btns{display:flex}
  .drag-handle{display:none}
  /* Prevent iOS auto-zoom — all inputs must be ≥16px */
  .filter-input,.ing-row input{font-size:16px}
  /* Modal — less horizontal padding on narrow screens */
  .modal-sheet{padding:20px 16px}
  /* Slot header — allow actions to wrap to second line */
  .slot-header{flex-wrap:wrap;gap:6px}
  .slot-actions{flex-wrap:wrap;gap:4px;justify-content:flex-end;margin-left:auto}
  .slot-actions .btn-sm{padding:6px 8px;font-size:12px}
  .slot-actions .pill{padding:5px 8px;font-size:11px}
  /* Section header — top-align so wrapping pills don't float-center */
  .section-header{align-items:flex-start}
  /* Three-column form rows → single column on mobile */
  .form-row-3{grid-template-columns:1fr}
  /* Filter inputs — even widths, allow wrapping */
  .filter-input{flex:1 1 90px}
  /* Ingredient edit grid — two-row layout: name full-width, macros below */
  .ing-row:has(input){grid-template-columns:1fr 1fr 1fr 1fr 28px;grid-template-rows:auto auto}
  .ing-row:has(input)>input:first-child{grid-column:1/5;grid-row:1}
  .ing-row:has(input) .ing-del{grid-column:5;grid-row:1}
  .ing-row:has(input)>input:nth-child(2){grid-column:1;grid-row:2}
  .ing-row:has(input)>input:nth-child(3){grid-column:2;grid-row:2}
  .ing-row:has(input)>input:nth-child(4){grid-column:3;grid-row:2}
  .ing-row:has(input)>input:nth-child(5){grid-column:4;grid-row:2}
  /* Ingredient column headers — hidden on mobile (placeholders are labels) */
  .ing-header{display:none}
  /* Ingredient totals — label spans full width, values on second row */
  .ing-totals{grid-template-columns:1fr 1fr 1fr 1fr}
  .ing-totals>span:first-child{grid-column:1/-1;font-size:11px;color:var(--text-3);margin-bottom:2px}
  .ing-totals>span:last-child{display:none}
  /* Toast — allow text wrapping on narrow screens */
  .toast{max-width:calc(100vw - 32px);white-space:normal;text-align:center;line-height:1.4}
  /* Recipe card footer — allow buttons to wrap */
  .recipe-footer{flex-wrap:wrap}
  /* Summary calories number — slightly smaller to prevent clipping */
  .summary-right .big-num{font-size:22px}
}

/* ── Add Meal Category Cards ── */
.meal-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.meal-type-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:18px 10px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;background:var(--surface);text-align:center}
.meal-type-card:hover{border-color:var(--primary);background:var(--primary-light)}
.meal-type-card .mti{font-size:28px}
.meal-type-card .mtl{font-size:13px;font-weight:700;color:var(--text)}
.meal-type-card .mts{font-size:11px;color:var(--text-3)}
</style>

<script>
// ═══════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'forma_v1';

function defaultState() {
  return {
    onboardingComplete: false,
    profile: {
      name: '', age: '', sex: '',
      weightLbs: '', heightFt: '', heightIn: '',
      goal: 'maintain', activity: 'moderate',
      calories: 2200, protein: 165, carbs: 220, fat: 73
    },
    fixedItems: [],
    savedMeals: [],
    dailyPlans: {},
    weeklyTemplate: null,
    apiKey: '',
    apiProvider: 'openai',
    currentView: 'today',
    onboardingStep: 1
  };
}

let STATE = (() => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return { ...defaultState(), ...JSON.parse(saved) };
  } catch(e) {}
  return defaultState();
})();

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); } catch(e) {}
}

let lastKnownDate = today();

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function todayLabel() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function getWeekDates() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split('T')[0];
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function showToast(msg, duration = 2500) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// ═══════════════════════════════════════════════════
// TDEE & MACRO MATH
// ═══════════════════════════════════════════════════
const ACTIVITY_MULT = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very:1.9 };
const GOAL_ADJ = { lose:-500, maintain:0, gain:300, bulk:500 };
const GOAL_MACROS = {
  lose:   { p:.40, c:.30, f:.30 },
  maintain:{ p:.30, c:.40, f:.30 },
  gain:   { p:.35, c:.40, f:.25 },
  bulk:   { p:.25, c:.50, f:.25 }
};

function calcTDEE(profile) {
  const weightKg = profile.weightLbs * 0.453592;
  const heightCm = (profile.heightFt * 30.48) + (profile.heightIn * 2.54);
  const bmr = profile.sex === 'male'
    ? 10 * weightKg + 6.25 * heightCm - 5 * profile.age + 5
    : 10 * weightKg + 6.25 * heightCm - 5 * profile.age - 161;
  const tdee = bmr * (ACTIVITY_MULT[profile.activity] || 1.55);
  const cal = Math.round(tdee + (GOAL_ADJ[profile.goal] || 0));
  const split = GOAL_MACROS[profile.goal] || GOAL_MACROS.maintain;
  return {
    calories: Math.max(1200, cal),
    protein: Math.round((cal * split.p) / 4),
    carbs: Math.round((cal * split.c) / 4),
    fat: Math.round((cal * split.f) / 9)
  };
}

function adjustMacros(field, rawVal, cur) {
  const val = parseFloat(rawVal) || 0;
  if (val < 0) return cur;
  let { calories, protein, carbs, fat } = { ...cur };

  if (field === 'calories') {
    const ratio = calories > 0 ? val / calories : 1;
    return { calories: Math.round(val), protein: Math.round(protein*ratio), carbs: Math.round(carbs*ratio), fat: Math.round(fat*ratio) };
  }
  if (field === 'protein') {
    protein = Math.round(val);
    const used = protein * 4;
    const remaining = calories - used;
    if (remaining < 0) {
      // Raise calories to fit
      return { calories: Math.round(used + carbs*4 + fat*9), protein, carbs, fat };
    }
    const prevNon = carbs*4 + fat*9;
    const cRatio = prevNon > 0 ? (carbs*4)/prevNon : 0.55;
    return { calories, protein, carbs: Math.round(remaining*cRatio/4), fat: Math.round(remaining*(1-cRatio)/9) };
  }
  if (field === 'carbs') {
    carbs = Math.round(val);
    const used = protein*4 + carbs*4;
    if (used > calories) return { calories: Math.round(used + fat*9), protein, carbs, fat };
    return { calories, protein, carbs, fat: Math.round((calories-used)/9) };
  }
  if (field === 'fat') {
    fat = Math.round(val);
    const used = protein*4 + fat*9;
    if (used > calories) return { calories: Math.round(used + carbs*4), protein, carbs, fat };
    return { calories, protein, carbs: Math.round((calories-used)/4), fat };
  }
  return cur;
}

function macrosFromItems(items) {
  return items.reduce((acc, it) => ({
    calories: acc.calories + (it.calories||0),
    protein: acc.protein + (it.protein||0),
    carbs: acc.carbs + (it.carbs||0),
    fat: acc.fat + (it.fat||0)
  }), { calories:0, protein:0, carbs:0, fat:0 });
}

// Calorie weighting: snacks get much less than meals; lunch & dinner are biggest
function slotWeight(slot) {
  if (slot.type === 'snack') return 0.08;
  const cat = slot.category || '';
  const label = (slot.label || '').toLowerCase();
  if (cat === 'dessert' || label.includes('dessert')) return 0.10;
  if (cat === 'breakfast' || label.includes('breakfast')) return 0.25;
  if (cat === 'lunch' || label.includes('lunch'))     return 0.32;
  if (cat === 'dinner' || label.includes('dinner') || label.includes('supper')) return 0.32;
  return 0.28; // generic meal slot
}

// Derive a recipe mealType string from a slot
function slotMealType(slot) {
  const cat = slot.category || '';
  if (cat) return cat;
  // Legacy slots — infer from label
  const label = (slot.label || '').toLowerCase();
  if (label.includes('breakfast')) return 'breakfast';
  if (label.includes('lunch'))     return 'lunch';
  if (label.includes('dinner') || label.includes('supper')) return 'dinner';
  if (label.includes('snack'))     return 'snack';
  if (label.includes('dessert'))   return 'dessert';
  return slot.type; // 'meal' or 'snack'
}

// Returns the weighted macro target for a single slot given remaining macros and all empty slots
function weightedSlotTarget(slot, remaining, emptySlots) {
  if (!emptySlots.length) return { cal:0, prot:0, carbs:0, fat:0 };
  const totalWeight = emptySlots.reduce((s, sl) => s + slotWeight(sl), 0);
  const ratio = totalWeight > 0 ? slotWeight(slot) / totalWeight : 1 / emptySlots.length;
  return {
    cal:   Math.max(50,  Math.round(remaining.calories * ratio)),
    prot:  Math.max(0,   Math.round(remaining.protein  * ratio)),
    carbs: Math.max(0,   Math.round(remaining.carbs    * ratio)),
    fat:   Math.max(0,   Math.round(remaining.fat      * ratio))
  };
}

// ═══════════════════════════════════════════════════
// DAILY PLAN HELPERS
// ═══════════════════════════════════════════════════
function getOrCreatePlan(dateStr) {
  if (!STATE.dailyPlans[dateStr]) {
    STATE.dailyPlans[dateStr] = { slots: defaultSlots(), approved: false };
    saveState();
  }
  return STATE.dailyPlans[dateStr];
}

function defaultSlots() {
  const cal = STATE.profile.calories;
  // Under 1600 cal: minimum two meals + one snack
  if (cal < 1600) {
    return [
      { id: uid(), type:'meal', category:'lunch',  label:'Lunch',  preference:'', meal:null, open:false, seenNames:[] },
      { id: uid(), type:'meal', category:'dinner', label:'Dinner', preference:'', meal:null, open:false, seenNames:[] },
      { id: uid(), type:'snack', category:'snack', label:'Snack 1', preference:'', meal:null, open:false, seenNames:[] }
    ];
  }
  // Over 1600 cal: minimum three meals + one snack + one dessert
  const snacks = cal < 2400 ? 1 : 2;
  const slots = [
    { id: uid(), type:'meal', category:'breakfast', label:'Breakfast', preference:'', meal:null, open:false, seenNames:[] },
    { id: uid(), type:'meal', category:'lunch',     label:'Lunch',     preference:'', meal:null, open:false, seenNames:[] },
    { id: uid(), type:'meal', category:'dinner',    label:'Dinner',    preference:'', meal:null, open:false, seenNames:[] }
  ];
  for (let i = 0; i < snacks; i++) {
    slots.push({ id: uid(), type:'snack', category:'snack', label:`Snack ${i+1}`, preference:'', meal:null, open:false, seenNames:[] });
  }
  slots.push({ id: uid(), type:'meal', category:'dessert', label:'Dessert', preference:'', meal:null, open:false, seenNames:[] });
  return slots;
}

function getPlanTotals(plan) {
  const slotTotals = plan.slots.reduce((acc, slot) => {
    if (slot.meal && !slot.open) {
      acc.calories += slot.meal.calories || 0;
      acc.protein += slot.meal.protein || 0;
      acc.carbs += slot.meal.carbs || 0;
      acc.fat += slot.meal.fat || 0;
    }
    return acc;
  }, { calories:0, protein:0, carbs:0, fat:0 });
  // Add any manually logged foods
  const logged = (plan.loggedFoods || []).reduce((acc, f) => ({
    calories: acc.calories + (f.calories||0),
    protein: acc.protein + (f.protein||0),
    carbs: acc.carbs + (f.carbs||0),
    fat: acc.fat + (f.fat||0)
  }), { calories:0, protein:0, carbs:0, fat:0 });
  return {
    calories: slotTotals.calories + logged.calories,
    protein: slotTotals.protein + logged.protein,
    carbs: slotTotals.carbs + logged.carbs,
    fat: slotTotals.fat + logged.fat
  };
}

function wouldExceedCalorieLimit(dateStr, additionalCalories, excludeSlotId) {
  const plan = STATE.dailyPlans[dateStr];
  const target = STATE.profile.calories;
  const planTotals = plan ? getPlanTotals(plan) : { calories: 0 };
  let currentCal = planTotals.calories;
  // Subtract the slot being replaced so we don't double-count
  if (excludeSlotId && plan) {
    const slot = plan.slots.find(s => s.id === excludeSlotId);
    if (slot?.meal) currentCal -= (slot.meal.calories || 0);
  }
  const { totals: fixedTotals } = getActiveFixedTotals(dateStr);
  return (currentCal + fixedTotals.calories + additionalCalories) > (target + 50);
}

function getActiveFixedTotals(dateStr) {
  const key = `fixed_active_${dateStr}`;
  let active;
  try { active = JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { active = null; }
  if (!active) {
    active = STATE.fixedItems.reduce((o, it) => { o[it.id] = true; return o; }, {});
    localStorage.setItem(key, JSON.stringify(active));
  }
  return { active, totals: STATE.fixedItems.filter(it => active[it.id]).reduce((acc, it) => ({
    calories: acc.calories+(it.calories||0), protein: acc.protein+(it.protein||0),
    carbs: acc.carbs+(it.carbs||0), fat: acc.fat+(it.fat||0)
  }), { calories:0, protein:0, carbs:0, fat:0 }) };
}

function setFixedItemActive(dateStr, itemId, val) {
  const key = `fixed_active_${dateStr}`;
  let active;
  try { active = JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { active = null; }
  if (!active) active = STATE.fixedItems.reduce((o,it) => { o[it.id]=true; return o; }, {});
  active[itemId] = val;
  localStorage.setItem(key, JSON.stringify(active));
}

  'crispbread':  [38, 1.5, 7.5, 0.3], // crispbread/cracker piece ~10g
  'stalk':       [6, 0.3, 1.1, 0.1],  // celery stalk ~38g
  'stalks':      [6, 0.3, 1.1, 0.1],  // celery stalks (plural)
};

function ingMacros(ing, scale) {
  const n = ing.amount * scale;
  const u = ing.unit;
  // Unit-based items
  if (IMAC_UNIT[u]) {
    const r = IMAC_UNIT[u];
    return { cal: Math.round(r[0]*n), p: Math.round(r[1]*n), c: Math.round(r[2]*n), f: Math.round(r[3]*n) };
  }
  // Gram/ml lookup by item name
  const key = ing.item.toLowerCase().replace(/\s*\([^)]*\)/g,'').trim();
  const rate = IMAC[key] || IMAC[key.split(',')[0].trim()] || IMAC[key.split(' ').slice(0,2).join(' ')] || IMAC[key.split(' ')[0]];
  if (rate) return { cal: Math.round(rate[0]*n), p: Math.round(rate[1]*n), c: Math.round(rate[2]*n), f: Math.round(rate[3]*n) };
  return null; // unknown — will show dash
}

function fmtAmt(n, u) {
  if (u === 'g')         return `${Math.round(n)}g`;
  if (u === 'ml')        return `${Math.round(n)}ml`;
  if (u === 'egg')       return `${Math.max(1,Math.round(n))} egg${Math.round(n)!==1?'s':''}`;
  if (u === 'egg white') return `${Math.max(1,Math.round(n))} egg white${Math.round(n)!==1?'s':''}`;
  if (u === 'slice')     return `${Math.max(1,Math.round(n))} slice${Math.round(n)!==1?'s':''}`;
  if (u === 'tortilla')  return `${Math.max(1,Math.round(n))} tortilla${Math.round(n)!==1?'s':''}`;
  if (u === 'clove')     return `${Math.max(1,Math.round(n))} clove${Math.round(n)!==1?'s':''}`;
  if (u === 'cake')      return `${Math.max(1,Math.round(n))} rice cake${Math.round(n)!==1?'s':''}`;
  if (u === 'large')     return `${Math.max(1,Math.round(n))} large`;
  if (u === 'banana' || u === 'apple' || u === 'lemon' || u === 'medium' || u === 'wedge')
                         return `${Math.max(1,Math.round(n))} ${u}${Math.round(n)!==1?'s':''}`;
  if (u === 'muffin')       return `${Math.max(1,Math.round(n))} English muffin${Math.round(n)!==1?'s':''}`;
  if (u === 'corn tortilla') return `${Math.max(1,Math.round(n))} corn tortilla${Math.round(n)!==1?'s':''}`;
  if (u === 'crispbread')   return `${Math.max(1,Math.round(n))} crispbread${Math.round(n)!==1?'s':''}`;
  if (u === 'stalk' || u === 'stalks') return `${Math.max(1,Math.round(n))} stalk${Math.round(n)!==1?'s':''}`;
  if (u === 'spray' || u === 'pinch' || u === 'to taste') return `${ing.amount} ${u}`;
  return `${Math.round(n*10)/10} ${u}`;
}

// ─── Scale a single ingredient — returns display object with macros ───
function scaleIngredient(ing, scale) {
  const m = ingMacros(ing, scale);
  return { item: ing.item, amount: fmtAmt(ing.amount * scale, ing.unit), ...( m || {}) };
}

// ─── Compute recipe base macros from ingredient lookup table ───
function computeIngredientBaseMacros(recipe) {
  let cal = 0, p = 0, c = 0, f = 0, allKnown = true;
  for (const ing of recipe.ingredients) {
    const m = ingMacros(ing, 1);
    if (!m) { allKnown = false; break; }
    cal += m.cal; p += m.p; c += m.c; f += m.f;
  }
  return allKnown ? { cal, p, c, f } : null;
}

// ─── Built-in recipe generator ───
function generateRecipe({ preference, targetCal, targetProt, targetCarbs, targetFat, mealType, excludeNames = [] }) {
  const specificTypes = ['breakfast','lunch','dinner','snack','dessert'];
  let pool;
  if (specificTypes.includes(mealType)) {
    pool = RECIPE_DB.filter(r => r.mealTypes.includes(mealType));
    if (!pool.length) pool = RECIPE_DB.filter(r => r.mealTypes.some(t => t !== 'snack' && t !== 'dessert'));
  } else {
    // Generic 'meal' — exclude snacks and desserts
    pool = RECIPE_DB.filter(r => r.mealTypes.some(t => t !== 'snack' && t !== 'dessert'));
  }
  // Filter out previously seen recipes; if all are excluded, reset to full pool
  const fresh = pool.filter(r => !excludeNames.includes(r.name));
  if (fresh.length > 0) pool = fresh;
  if (preference && preference.trim()) {
    const lower = preference.toLowerCase().trim();
    const scored = pool.map(r => {
      let score = 0;
      r.keywords.forEach(k => { if (lower.includes(k)) score += 10; else if (k.split(' ').some(w => w.length > 3 && lower.includes(w))) score += 4; });
      r.name.toLowerCase().split(' ').forEach(w => { if (w.length > 3 && lower.includes(w)) score += 3; });
      return { r, score };
    }).filter(x => x.score > 0);
    if (scored.length) { scored.sort((a,b)=>b.score-a.score); pool = scored.slice(0,8).map(x=>x.r); }
  }
  // Pick completely randomly from the pool for maximum variety
  const pick = pool[Math.floor(Math.random() * pool.length)];
  // Use ingredient-computed base calories for accurate scaling (fallback to hard-coded baseCal)
  const ingBase = computeIngredientBaseMacros(pick);
  const effectiveBaseCal = (ingBase && ingBase.cal > 50) ? ingBase.cal : (pick.baseCal || 500);
  const scale = effectiveBaseCal > 0 ? targetCal / effectiveBaseCal : 1;
  const scaledIngs = pick.ingredients.map(ing => scaleIngredient(ing, scale));
  // Re-sum macros from ingredient lookups where available, fall back to recipe-level scaling
  const knownIngs = scaledIngs.filter(i => i.cal !== undefined);
  let calories, protein, carbs, fat;
  if (knownIngs.length === scaledIngs.length) {
    calories = scaledIngs.reduce((s,i)=>s+(i.cal||0),0);
    protein  = scaledIngs.reduce((s,i)=>s+(i.p||0),0);
    carbs    = scaledIngs.reduce((s,i)=>s+(i.c||0),0);
    fat      = scaledIngs.reduce((s,i)=>s+(i.f||0),0);
  } else {
    const ingP = ingBase ? ingBase.p : pick.baseP;
    const ingC = ingBase ? ingBase.c : pick.baseC;
    const ingF = ingBase ? ingBase.f : pick.baseF;
    calories = Math.round(effectiveBaseCal*scale); protein = Math.round(ingP*scale);
    carbs    = Math.round(ingC*scale);   fat     = Math.round(ingF*scale);
  }
  return Promise.resolve({ name:pick.name, description:pick.description, prepTime:pick.prepTime, cookTime:pick.cookTime, calories, protein, carbs, fat, ingredients:scaledIngs, instructions:pick.instructions, _recipeId:pick.id });
}

function navigate(view) {
  STATE.currentView = view;
  render();
}

function toggleMobileMenu(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('mobile-nav-dropdown');
  if (dropdown) {
    const nav = document.querySelector('.nav-bar.top');
    if (nav) dropdown.style.top = nav.getBoundingClientRect().bottom + 'px';
    dropdown.classList.toggle('open');
  }
}

document.addEventListener('click', function() {
  const dropdown = document.getElementById('mobile-nav-dropdown');
  if (dropdown) dropdown.classList.remove('open');
});

function render() {
  const app = document.getElementById('app');
  if (!STATE.onboardingComplete) {
    app.innerHTML = renderOnboarding();
    bindOnboarding();
    return;
  }
  app.innerHTML = renderApp();
  bindApp();
}

  const v = STATE.currentView;

let tempProfile = {};

function renderOnboarding() {
  const s = STATE.onboardingStep;
  const steps = 4;
  const dots = Array.from({length:steps}, (_,i) => `<div class="step-dot ${i+1===s?'active':i+1<s?'done':''}"></div>`).join('');

  let body = '';
  if (s === 1) body = renderOB1();
  else if (s === 2) body = renderOB2();
  else if (s === 3) body = renderOB3();
  else if (s === 4) body = renderOB4();

  return `<div class="onboard-wrap">
    <div class="onboard-header">
      <div class="onboard-logo">${LOGO_SVG}<span>Nommie</span></div>
      <p style="color:var(--text-3);font-size:13px;letter-spacing:0.3px">eating cute, one meal at a time</p>
    </div>
    <div class="onboard-body">
      <div class="step-indicator">${dots}</div>
      ${body}
    </div>
  </div>`;
}

function renderOB1() {

function renderOB3() {
  // Calculate recommended macros and show editable form
  const calculated = calcTDEE(STATE.profile);
  if (!tempMacros.calories) tempMacros = { ...calculated };
  const m = tempMacros;
  const calCheck = Math.round(m.protein*4 + m.carbs*4 + m.fat*9);
  return `
    <div class="step-title">Your daily targets</div>
    <div class="step-sub">We calculated these based on your profile. Edit any number — everything adjusts automatically.</div>
    <div class="macro-edit-grid" id="macro-grid">
      <div class="macro-field calories">
        <label><span class="dot" style="background:#2a6049"></span>Calories</label>
        <input type="number" id="me-calories" value="${m.calories}" data-field="calories">
        <div class="unit">kcal / day</div>
      </div>
      <div class="macro-field">
        <label><span class="dot" style="background:var(--protein)"></span>Protein</label>
        <input type="number" id="me-protein" value="${m.protein}" data-field="protein">
        <div class="unit">grams — ${Math.round(m.protein*4/m.calories*100)}% of cals</div>
      </div>
      <div class="macro-field">
        <label><span class="dot" style="background:var(--carbs)"></span>Carbs</label>
        <input type="number" id="me-carbs" value="${m.carbs}" data-field="carbs">
        <div class="unit">grams — ${Math.round(m.carbs*4/m.calories*100)}% of cals</div>
      </div>
      <div class="macro-field">
        <label><span class="dot" style="background:var(--fat)"></span>Fat</label>
        <input type="number" id="me-fat" value="${m.fat}" data-field="fat">
        <div class="unit">grams — ${Math.round(m.fat*9/m.calories*100)}% of cals</div>
      </div>
    </div>
    <p style="font-size:12px;color:var(--text-3);margin-top:8px;text-align:center">Macro calories: ${calCheck} kcal</p>
    <div class="nav-btns">
      <button class="btn btn-secondary" onclick="tempMacros={};STATE.onboardingStep=2;render()">← Back</button>
      <button class="btn btn-primary" id="ob-next3" style="flex:1">Looks good →</button>
    </div>
  `;
}

      <div class="macros">${it.calories} cal · ${it.protein}g protein · ${it.carbs}g carbs · ${it.fat}g fat</div>
    </div>
    <button class="btn btn-danger btn-sm" onclick="removeFixedItem('${it.id}')">✕</button>
  </div>`;
}

function removeFixedItem(id) {
  STATE.fixedItems = STATE.fixedItems.filter(f => f.id !== id);
  saveState();
  const row = document.getElementById(`firow-${id}`);
  if (row) row.remove();
}

function bindOnboarding() {
  const s = STATE.onboardingStep;
  if (s === 1) {
    document.getElementById('ob-next1')?.addEventListener('click', () => {
      const name = document.getElementById('ob-name').value.trim();
      const age = parseInt(document.getElementById('ob-age').value) || 0;
      const sex = document.getElementById('ob-sex').value;
      const weightLbs = parseFloat(document.getElementById('ob-weight').value) || 0;
      const heightFt = parseInt(document.getElementById('ob-hft').value) || 0;
      const heightIn = parseInt(document.getElementById('ob-hin').value) || 0;
      Object.assign(STATE.profile, { name, age, sex, weightLbs, heightFt, heightIn });
      saveState();
      STATE.onboardingStep = 2;
      render();
    });
  }
  if (s === 2) {
    document.querySelectorAll('[data-group]').forEach(el => {
      el.addEventListener('click', () => {
        const group = el.dataset.group;
        const val = el.dataset.val;
        document.querySelectorAll(`[data-group="${group}"]`).forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        STATE.profile[group] = val;
      });
    });
    document.getElementById('ob-next2')?.addEventListener('click', () => {
      saveState();
      tempMacros = calcTDEE(STATE.profile);
      STATE.onboardingStep = 3;
      render();
    });
  }
  if (s === 3) {
    document.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('change', () => {
        const field = input.dataset.field;
        tempMacros = adjustMacros(field, input.value, tempMacros);
        // Update all fields without full re-render
        const m = tempMacros;
        const fields = ['calories','protein','carbs','fat'];
        fields.forEach(f => {
          const el = document.getElementById(`me-${f}`);
          if (el && el !== input) el.value = m[f];
        });
        // Update percentages
        document.querySelectorAll('.macro-field .unit').forEach(u => {
          const fEl = u.previousElementSibling;
          if (!fEl) return;
          const f = fEl.dataset.field;
          if (f === 'protein') u.textContent = `grams — ${Math.round(m.protein*4/m.calories*100)}% of cals`;
          if (f === 'carbs') u.textContent = `grams — ${Math.round(m.carbs*4/m.calories*100)}% of cals`;
          if (f === 'fat') u.textContent = `grams — ${Math.round(m.fat*9/m.calories*100)}% of cals`;
        });
        const calCheck = Math.round(m.protein*4+m.carbs*4+m.fat*9);
        const cc = document.querySelector('[style*="Macro calories"]');
        if (cc) cc.textContent = `Macro calories: ${calCheck} kcal`;
      });
    });
    document.getElementById('ob-next3')?.addEventListener('click', () => {
      Object.assign(STATE.profile, tempMacros);
      saveState();
      STATE.onboardingStep = 4;
      render();
    });
  }
  if (s === 4) {
    document.getElementById('fi-add')?.addEventListener('click', () => {
      const name = document.getElementById('fi-name').value.trim();
      if (!name) { showToast('Please enter a name'); return; }
      const item = {
        id: uid(),
        name,
        calories: parseFloat(document.getElementById('fi-cal').value)||0,
        protein: parseFloat(document.getElementById('fi-prot').value)||0,
        carbs: parseFloat(document.getElementById('fi-carbs').value)||0,
        fat: parseFloat(document.getElementById('fi-fat').value)||0
      };
      STATE.fixedItems.push(item);
      saveState();
      const list = document.getElementById('fixed-items-list');
      if (list) {
        const empMsg = list.querySelector('p');
        if (empMsg) empMsg.remove();
        list.insertAdjacentHTML('beforeend', renderFixedItemRow(item));
      }
      ['fi-name','fi-cal','fi-prot','fi-carbs','fi-fat'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    });
    document.getElementById('ob-next4')?.addEventListener('click', () => {
      STATE.onboardingComplete = true;
      STATE.currentView = 'today';
      saveState();
      render();
    });
  }
}

function renderToday() {
  const dateStr = today();
  const plan = getOrCreatePlan(dateStr);
  const { active: fixedActive, totals: fixedTotals } = getActiveFixedTotals(dateStr);
  const mealTotals = getPlanTotals(plan);
  const consumed = {
    calories: fixedTotals.calories + mealTotals.calories,
    protein: fixedTotals.protein + mealTotals.protein,
    carbs: fixedTotals.carbs + mealTotals.carbs,
    fat: fixedTotals.fat + mealTotals.fat
  };
  const target = STATE.profile;
  const remaining = {
    calories: Math.max(0, target.calories - consumed.calories),
    protein: Math.max(0, target.protein - consumed.protein),
    carbs: Math.max(0, target.carbs - consumed.carbs),
    fat: Math.max(0, target.fat - consumed.fat)
  };
  const rawCalPct = consumed.calories / target.calories;
  const calPct = Math.min(1, rawCalPct);
  const circumference = 2 * Math.PI * 44;
  const offset = circumference * (1 - calPct);
  const ringColor = rawCalPct >= 1 ? '#fca5a5' : rawCalPct >= 0.8 ? '#fed7aa' : 'white';

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px">Today</div>
        <div style="font-size:13px;color:var(--text-2)">${todayLabel()}</div>
      </div>
      <span class="badge ${consumed.calories > 0 ? 'badge-green' : 'badge-gray'}">${consumed.calories > 0 ? 'Tracking' : 'Not started'}</span>
    </div>

    <div class="summary-section">
      <div class="summary-top">
        <div class="ring-wrap">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8"/>
            <circle cx="50" cy="50" r="44" fill="none" stroke="${ringColor}" stroke-width="8"
              stroke-dasharray="${circumference.toFixed(2)}"
              stroke-dashoffset="${offset.toFixed(2)}"
              stroke-linecap="round"/>
          </svg>
          <div class="ring-text">
            <div class="cals">${consumed.calories}</div>
            <div class="of">of ${target.calories}</div>
          </div>
        </div>
        <div class="summary-right">
          <div class="label">Remaining calories</div>
          <div class="big-num">${remaining.calories}</div>
          <div class="sub">${consumed.calories > target.calories ? `${IC.warn} Over target` : `${Math.round(rawCalPct*100)}% of daily goal`}</div>
        </div>
      </div>
      <div class="macro-bars">
        ${[
          { label:'Protein', val:consumed.protein, tgt:target.protein, unit:'g', color:'var(--protein)' },
          { label:'Carbs', val:consumed.carbs, tgt:target.carbs, unit:'g', color:'var(--carbs)' },
          { label:'Fat', val:consumed.fat, tgt:target.fat, unit:'g', color:'var(--fat)' }
        ].map(m => {
          const mPct = m.tgt > 0 ? m.val / m.tgt : 0;
          const barColor = mPct >= 1 ? '#ef4444' : mPct >= 0.75 ? '#fbbf24' : '#ffffff';
          return `<div class="macro-bar-item">
            <label>${m.label}</label>
            <div class="macro-bar-track"><div class="macro-bar-fill" style="width:${Math.min(100,mPct*100).toFixed(1)}%;background:${barColor}"></div></div>
            <div class="macro-bar-nums">${m.val}/${m.tgt}${m.unit}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${STATE.fixedItems.length ? `
    <div class="section-header">
      <span class="section-title">Pre-logged items</span>
      <span style="font-size:12px;color:var(--text-3)">${fixedTotals.calories} cal auto-added</span>
    </div>
    ${STATE.fixedItems.map(it => `
      <div class="fixed-item ${fixedActive[it.id]===false?'fixed-item-inactive':''}">
        <label class="fixed-item-toggle">
          <input type="checkbox" ${fixedActive[it.id]!==false?'checked':''} onchange="toggleFixedItem('${dateStr}','${it.id}',this.checked)">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
        <div class="fixed-item-info">
          <div class="fixed-item-name">${it.name}</div>
          <div class="fixed-item-macros">${it.calories} cal · ${it.protein}g P · ${it.carbs}g C · ${it.fat}g F</div>
        </div>
      </div>
    `).join('')}
    <div style="margin-bottom:16px"></div>
    ` : ''}

    <div class="section-header">
      <span class="section-title">Meal Plan</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        <button class="pill" onclick="resetDailyPlan()" style="background:#fef2f2;border-color:#fecaca;color:#ef4444">${IC.refresh} Reset day</button>
        <button class="pill" onclick="showAddMealModal('${dateStr}')">+ Meal</button>
        <button class="pill" onclick="addSlot('${dateStr}','snack')">+ Snack</button>
        <button class="pill" onclick="addSlot('${dateStr}','dessert')">+ Dessert</button>
      </div>
    </div>

    ${plan.slots.map(slot => renderMealSlot(slot, dateStr, remaining, plan.slots)).join('')}

    <div class="section-header" style="margin-top:8px">
      <span class="section-title">Other foods</span>
      <button class="pill" style="background:var(--primary-light);border-color:var(--primary);color:var(--primary)" onclick="showLogFoodModal('${dateStr}')">+ Log Food</button>
    </div>
    ${(plan.loggedFoods||[]).length ? `
    <div style="margin-bottom:12px">
      ${(plan.loggedFoods||[]).map(f => `
      <div class="logged-food-row">
        <div class="logged-food-info">
          <div class="logged-food-name">${f.name}</div>
          <div class="logged-food-macros">${f.calories} cal · ${f.protein}g P · ${f.carbs}g C · ${f.fat}g F</div>
        </div>
        <button class="btn-remove-log" onclick="removeLoggedFood('${dateStr}','${f.id}')" title="Remove">✕</button>
      </div>`).join('')}
    </div>
    ` : `<div style="color:var(--text-3);font-size:13px;padding:8px 0 16px">Log any food not covered by your meal plan above.</div>`}

    <div style="height:20px"></div>
  `;
}

function renderMealSlot(slot, dateStr, remaining, allSlots) {
  const emptySlots = allSlots.filter(s => !s.meal && !s.open);
  const wt = weightedSlotTarget(slot, remaining, emptySlots);
  const perSlotCal = wt.cal;
  const perSlotProt = wt.prot;

  const targetCal = slot.meal ? slot.meal.calories : perSlotCal;
  const isSnack = slot.type === 'snack';
  const slotIdx = allSlots.findIndex(s => s.id === slot.id);
  const isFirst = slotIdx === 0;
  const isLast = slotIdx === allSlots.length - 1;

  return `<div class="meal-slot" id="slot-${slot.id}" data-slot-id="${slot.id}" draggable="true">
    <div class="slot-header">
      <div class="slot-reorder-btns">
        ${!isFirst ? `<button class="btn-reorder" onclick="moveSlot('${dateStr}','${slot.id}','up')" title="Move up">^</button>` : ''}
        ${!isLast ? `<button class="btn-reorder" onclick="moveSlot('${dateStr}','${slot.id}','down')" title="Move down">v</button>` : ''}
      </div>
      <span class="drag-handle" title="Drag to reorder"><svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="4" cy="3" r="1.5" fill="#9ca3af"/><circle cx="10" cy="3" r="1.5" fill="#9ca3af"/><circle cx="4" cy="9" r="1.5" fill="#9ca3af"/><circle cx="10" cy="9" r="1.5" fill="#9ca3af"/><circle cx="4" cy="15" r="1.5" fill="#9ca3af"/><circle cx="10" cy="15" r="1.5" fill="#9ca3af"/></svg></span>
      <div style="flex:1">
        <div class="slot-title">${slot.label}</div>
        ${!slot.meal && !slot.open ? `<div class="slot-target">~${perSlotCal} cal · ${perSlotProt}g P target</div>` : ''}
        ${slot.meal ? `<div class="slot-target">${slot.meal.calories} cal · ${slot.meal.protein}g P · ${slot.meal.carbs}g C · ${slot.meal.fat}g F</div>` : ''}
      </div>
      <div class="slot-actions">
        ${slot.meal ? `
          <button class="btn btn-secondary btn-sm" onclick="regenerateSlot('${dateStr}','${slot.id}')">↺ New</button>
          ${(() => { const isSaved = STATE.savedMeals.some(m => m.name === slot.meal.name); return `<button class="btn btn-secondary btn-sm" onclick="saveSlotMeal('${slot.id}')" style="${isSaved ? 'color:var(--primary);border-color:var(--primary)' : ''}" title="${isSaved ? 'Remove from saved' : 'Save meal'}">${isSaved ? IC.bookmarkFilled : IC.bookmark} ${isSaved ? 'Saved' : 'Save'}</button>`; })()}
        ` : !slot.open ? `
          <button class="pill" onclick="toggleSlotOpen('${dateStr}','${slot.id}')">Leave open</button>
          ${STATE.savedMeals.length ? `<button class="pill" style="background:var(--primary-light);border-color:var(--primary);color:var(--primary-dark)" onclick="showUseSaved('${dateStr}','${slot.id}')">Add from saved</button>` : ''}
        ` : ''}
        <button class="btn btn-ghost btn-sm" onclick="removeSlot('${dateStr}','${slot.id}')" title="Remove slot" style="color:var(--text-3);font-size:16px">✕</button>
      </div>
    </div>
    <div class="slot-body">
      ${slot.open ? `
        <div class="slot-open-badge">${IC.unlock} Open slot — logged as flex<button style="background:none;border:none;cursor:pointer;margin-left:8px;color:#854d0e;font-size:12px" onclick="toggleSlotOpen('${dateStr}','${slot.id}')">Undo</button></div>
      ` : slot.meal ? renderRecipeCard(slot.meal, slot.id) : `
        <div class="slot-empty">
          <input class="pref-input" id="pref-${slot.id}" placeholder="${(()=>{const cat=slot.category||slotMealType(slot);if(cat==='snack')return 'Snack idea? (e.g. chips and dip)';if(cat==='breakfast')return 'What sounds good? (e.g. overnight oats)';if(cat==='lunch')return 'What sounds good? (e.g. turkey wrap)';if(cat==='dinner')return 'What sounds good? (e.g. dumplings)';if(cat==='dessert')return 'Craving something? (e.g. brownies)';return 'What would you like?';})()}" value="${slot.preference||''}">
          <button class="btn-generate" id="gen-${slot.id}" onclick="generateSlot('${dateStr}','${slot.id}')">
            ${IC.sparkle} Generate
          </button>
        </div>
      `}
    </div>
  </div>`;
}

function renderRecipeCard(meal, slotId) {
  const id = slotId || 'preview';
  return `<div class="recipe-card">
    <div class="recipe-header">
      <div class="recipe-name">${meal.name}</div>
      ${meal.description ? `<div class="recipe-desc">${meal.description}</div>` : ''}

        ${meal.prepTime ? `<span class="recipe-time">${IC.clock} Prep ${meal.prepTime}</span>` : ''}
        ${meal.cookTime ? `<span class="recipe-time">${IC.pan} Cook ${meal.cookTime}</span>` : ''}
      </div>
    </div>

      <span class="chip chip-cal">${IC.flame} ${meal.calories} cal</span>
      <span class="chip chip-protein">${IC.protein} ${meal.protein}g protein</span>

        ${meal.ingredients.map(ing => {

            <div class="ing-row">
              <span class="ing-name">${ing.item}</span>

              <span class="ing-mac-chip imc-cal">${IC.flame} ${ing.cal} cal</span>
              <span class="ing-mac-chip imc-p">P ${ing.p}g</span>
              <span class="ing-mac-chip imc-c">C ${ing.c}g</span>

      </ul>
      ${(() => {
        const knownIngs = meal.ingredients.filter(i => i.cal !== undefined);
        if (knownIngs.length < 2) return '';
        const totCal = knownIngs.reduce((s,i)=>s+(i.cal||0),0);
        const totP   = knownIngs.reduce((s,i)=>s+(i.p||0),0);
        const totC   = knownIngs.reduce((s,i)=>s+(i.c||0),0);
        const totF   = knownIngs.reduce((s,i)=>s+(i.f||0),0);
        return `<div style="display:flex;gap:6px;flex-wrap:wrap;padding:8px 0;border-top:1px solid var(--border);margin-top:4px">

    ` : ''}
    ${meal.instructions?.length ? `
    <div class="recipe-section">
      <button class="collapsible-toggle" onclick="toggleInstructions('inst-${id}',this)">

      <div class="collapsible-content" id="inst-${id}" style="max-height:0">
        <ol class="instruction-list">

    ` : ''}
  </div>`;
}

function toggleInstructions(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.maxHeight !== '0px' && el.style.maxHeight !== '';
  el.style.maxHeight = isOpen ? '0' : el.scrollHeight + 'px';
  const arrow = btn.querySelector('span');
  if (arrow) arrow.textContent = isOpen ? '▶' : '▼';
  btn.childNodes[1].textContent = isOpen ? ' Show instructions' : ' Hide instructions';
}

// ═══════════════════════════════════════════════════
// TODAY ACTIONS
// ═══════════════════════════════════════════════════
function toggleFixedItem(dateStr, itemId, checked) {
  setFixedItemActive(dateStr, itemId, checked);
  renderTodayInPlace(dateStr);
}

function addSlot(dateStr, category) {
  const plan = getOrCreatePlan(dateStr);
  const type = category === 'snack' ? 'snack' : 'meal';
  let label;
  if (category === 'snack') {
    const n = plan.slots.filter(s => s.category === 'snack' || s.type === 'snack').length;
    label = `Snack ${n + 1}`;
  } else if (category === 'dessert') {
    const n = plan.slots.filter(s => s.category === 'dessert').length;
    label = n === 0 ? 'Dessert' : `Dessert ${n + 1}`;
  } else if (category === 'breakfast') {
    const n = plan.slots.filter(s => s.category === 'breakfast').length;
    label = n === 0 ? 'Breakfast' : `Breakfast ${n + 1}`;
  } else if (category === 'lunch') {
    const n = plan.slots.filter(s => s.category === 'lunch').length;
    label = n === 0 ? 'Lunch' : `Lunch ${n + 1}`;
  } else if (category === 'dinner') {
    const n = plan.slots.filter(s => s.category === 'dinner').length;
    label = n === 0 ? 'Dinner' : `Dinner ${n + 1}`;
  } else {
    const n = plan.slots.filter(s => s.category === 'meal' || (s.type === 'meal' && !s.category)).length;
    label = `Meal ${n + 1}`;
  }
  plan.slots.push({
    id: uid(),
    type,
    category,
    label,
    preference: '',
    meal: null,
    open: false,
    seenNames: []
  });
  saveState();
  renderTodayInPlace(dateStr);
}

function removeSlot(dateStr, slotId) {
  const plan = STATE.dailyPlans[dateStr];
  if (!plan) return;
  plan.slots = plan.slots.filter(s => s.id !== slotId);
  saveState();
  renderTodayInPlace(dateStr);
}

function toggleSlotOpen(dateStr, slotId) {
  const plan = STATE.dailyPlans[dateStr];
  const slot = plan?.slots.find(s => s.id === slotId);
  if (!slot) return;
  slot.open = !slot.open;
  saveState();
  renderTodayInPlace(dateStr);
}

function renderTodayInPlace(dateStr) {
  const content = document.querySelector('.page-content');
  if (content) {
    content.innerHTML = renderToday();
    bindToday();
  }
}

function bindToday() {
  initDragDrop(today());
  // Allow pressing Enter on the preference input to trigger recipe generation
  document.querySelectorAll('.pref-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const slotId = input.id.replace('pref-', '');
        document.getElementById('gen-' + slotId)?.click();
      }
    });
  });
}

let dragSrcId = null;
let touchDragId = null;
let touchClone = null;
let touchOffsetX = 0;
let touchOffsetY = 0;
let touchActiveDateStr = null;

function initDragDrop(dateStr) {
  const slots = document.querySelectorAll('.meal-slot[data-slot-id]');
  slots.forEach(el => {
    // Desktop drag-and-drop
    el.addEventListener('dragstart', e => {
      dragSrcId = el.dataset.slotId;
      setTimeout(() => el.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.meal-slot').forEach(s => s.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.meal-slot').forEach(s => s.classList.remove('drag-over'));
      if (el.dataset.slotId !== dragSrcId) el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (dragSrcId && dragSrcId !== el.dataset.slotId) {
        reorderSlots(dateStr, dragSrcId, el.dataset.slotId);
      }
    });

    // Unified pointer-event drag (works for mouse and touch, no passive/preventDefault issues)
    let ptrDragActive = false;

    const startPointerDrag = (e, captureEl) => {
      ptrDragActive = true;
      touchDragId = el.dataset.slotId;
      touchActiveDateStr = dateStr;
      const rect = el.getBoundingClientRect();
      touchOffsetX = e.clientX - rect.left;
      touchOffsetY = e.clientY - rect.top;
      touchClone = el.cloneNode(true);
      touchClone.style.cssText = `position:fixed;z-index:9999;width:${rect.width}px;left:${rect.left}px;top:${rect.top}px;opacity:0.85;pointer-events:none;box-shadow:0 8px 25px rgba(0,0,0,0.2);border-radius:12px;`;
      document.body.appendChild(touchClone);
      el.classList.add('dragging');
      if (navigator.vibrate) navigator.vibrate(40);
      try { captureEl.setPointerCapture(e.pointerId); } catch (_) {}
    };

    const onPointerMove = e => {
      if (!ptrDragActive || !touchClone) return;
      e.preventDefault();
      touchClone.style.left = `${e.clientX - touchOffsetX}px`;
      touchClone.style.top = `${e.clientY - touchOffsetY}px`;
      touchClone.style.display = 'none';
      const tgt = document.elementFromPoint(e.clientX, e.clientY);
      touchClone.style.display = '';
      const targetSlot = tgt?.closest('.meal-slot[data-slot-id]');
      document.querySelectorAll('.meal-slot').forEach(s => s.classList.remove('drag-over'));
      if (targetSlot && targetSlot.dataset.slotId !== touchDragId) targetSlot.classList.add('drag-over');
    };

    const onPointerEnd = e => {
      if (!ptrDragActive) return;
      ptrDragActive = false;
      if (touchClone) { touchClone.remove(); touchClone = null; }
      el.classList.remove('dragging');
      document.querySelectorAll('.meal-slot').forEach(s => s.classList.remove('drag-over'));
      if (e.type !== 'pointercancel') {
        const tgt = document.elementFromPoint(e.clientX, e.clientY);
        const targetSlot = tgt?.closest('.meal-slot[data-slot-id]');
        if (targetSlot && targetSlot.dataset.slotId !== touchDragId) {
          reorderSlots(touchActiveDateStr, touchDragId, targetSlot.dataset.slotId);
        }
      }
      touchDragId = null;
      touchActiveDateStr = null;
    };

    // Drag handle: immediate drag on pointer down (no long-press needed)
    const handle = el.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('pointerdown', e => {
        if (e.button !== 0 || ptrDragActive) return;
        e.preventDefault();
        startPointerDrag(e, handle);
      });
      handle.addEventListener('pointermove', onPointerMove);
      handle.addEventListener('pointerup', onPointerEnd);
      handle.addEventListener('pointercancel', onPointerEnd);
    }

    // Long-press on slot body to initiate drag
    let lpTimer = null;
    let lpStartX = 0, lpStartY = 0;

    el.addEventListener('pointerdown', e => {
      const tgt = e.target;
      if (tgt.closest('button') || tgt.closest('input') || tgt.closest('.drag-handle')) return;
      if (e.button !== 0 || ptrDragActive) return;
      lpStartX = e.clientX;
      lpStartY = e.clientY;
      const snap = { clientX: e.clientX, clientY: e.clientY, pointerId: e.pointerId };
      lpTimer = setTimeout(() => {
        lpTimer = null;
        startPointerDrag(snap, el);
      }, 450);
    });

    el.addEventListener('pointermove', e => {
      if (lpTimer && (Math.abs(e.clientX - lpStartX) > 8 || Math.abs(e.clientY - lpStartY) > 8)) {
        clearTimeout(lpTimer); lpTimer = null;
      }
      if (ptrDragActive) onPointerMove(e);
    });

    el.addEventListener('pointerup', e => {
      if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
      if (ptrDragActive) onPointerEnd(e);
    });
    el.addEventListener('pointercancel', e => {
      if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
      if (ptrDragActive) onPointerEnd(e);
    });
  });
}

function reorderSlots(dateStr, srcId, targetId) {
  const plan = STATE.dailyPlans[dateStr];
  if (!plan) return;
  const srcIdx = plan.slots.findIndex(s => s.id === srcId);
  const tgtIdx = plan.slots.findIndex(s => s.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [moved] = plan.slots.splice(srcIdx, 1);
  plan.slots.splice(tgtIdx, 0, moved);
  saveState();
  renderTodayInPlace(dateStr);
}

function moveSlot(dateStr, slotId, dir) {
  const plan = STATE.dailyPlans[dateStr];
  if (!plan) return;
  const idx = plan.slots.findIndex(s => s.id === slotId);
  if (idx === -1) return;
  const newIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= plan.slots.length) return;
  const [moved] = plan.slots.splice(idx, 1);
  plan.slots.splice(newIdx, 0, moved);
  saveState();
  renderTodayInPlace(dateStr);
}

async function generateSlot(dateStr, slotId) {
  const plan = STATE.dailyPlans[dateStr];
  const slot = plan?.slots.find(s => s.id === slotId);
  if (!slot) return;

  const prefInput = document.getElementById(`pref-${slotId}`);
  if (prefInput) slot.preference = prefInput.value.trim();

  const genBtn = document.getElementById(`gen-${slotId}`);
  if (genBtn) {
    genBtn.disabled = true;
    genBtn.innerHTML = '<span class="spinner"></span> Building...';
  }

  // Compute target macros for this slot
  const { totals: fixedTotals } = getActiveFixedTotals(dateStr);
  const filledTotals = plan.slots.reduce((acc, s) => {
    if (s.id === slotId || !s.meal) return acc;
    return { calories: acc.calories+(s.meal.calories||0), protein: acc.protein+(s.meal.protein||0), carbs: acc.carbs+(s.meal.carbs||0), fat: acc.fat+(s.meal.fat||0) };
  }, { calories:0, protein:0, carbs:0, fat:0 });
  const usedCal = fixedTotals.calories + filledTotals.calories;
  const stillEmpty = plan.slots.filter(s => !s.meal && !s.open);
  const remaining = {
    calories: Math.max(0, STATE.profile.calories - usedCal),
    protein:  Math.max(0, STATE.profile.protein  - fixedTotals.protein  - filledTotals.protein),
    carbs:    Math.max(0, STATE.profile.carbs     - fixedTotals.carbs    - filledTotals.carbs),
    fat:      Math.max(0, STATE.profile.fat       - fixedTotals.fat      - filledTotals.fat)
  };
  const wt = weightedSlotTarget(slot, remaining, stillEmpty);
  const isSnackType = slot.type === 'snack' || slot.category === 'snack' || slot.category === 'dessert';
  const slotCalCap = isSnackType ? 400 : 1100;
  const remainCal   = Math.min(Math.max(100, wt.cal), slotCalCap);
  const remainProt  = wt.prot;
  const remainCarbs = wt.carbs;
  const remainFat   = wt.fat;

  try {
    let recipe = await generateRecipe({
      preference: slot.preference,
      targetCal: Math.round(remainCal),
      targetProt: Math.round(remainProt),
      targetCarbs: Math.round(remainCarbs),
      targetFat: Math.round(remainFat),
      mealType: slotMealType(slot),
      excludeNames: slot.seenNames || []
    });
    // Enforce hard per-slot-type calorie cap
    if ((recipe.calories || 0) > slotCalCap) {
      const r = slotCalCap / recipe.calories;
      recipe = { ...recipe, calories: slotCalCap, protein: Math.round((recipe.protein||0)*r), carbs: Math.round((recipe.carbs||0)*r), fat: Math.round((recipe.fat||0)*r) };
    }
    if (wouldExceedCalorieLimit(dateStr, recipe.calories || 0, slotId)) {
      showToast(`"${recipe.name}" (${recipe.calories} cal) would exceed daily calorie limit — try regenerating`, 4000);
      if (genBtn) {
        genBtn.disabled = false;
        genBtn.innerHTML = IC.sparkle + ' Generate';
      }
      return;
    }
    slot.meal = recipe;
    saveState();
    renderTodayInPlace(dateStr);
  } catch(err) {
    showToast(`Error: ${err.message}`, 4000);
    if (genBtn) {
      genBtn.disabled = false;
      genBtn.innerHTML = IC.sparkle + ' Generate';
    }
  }
}

async function regenerateSlot(dateStr, slotId) {
  const plan = STATE.dailyPlans[dateStr];
  const slot = plan?.slots.find(s => s.id === slotId);
  if (!slot) return;
  if (slot.meal?.name) {
    if (!slot.seenNames) slot.seenNames = [];
    if (!slot.seenNames.includes(slot.meal.name)) slot.seenNames.push(slot.meal.name);
  }
  slot.meal = null;
  saveState();
  renderTodayInPlace(dateStr);
  // Small delay then generate
  setTimeout(() => generateSlot(dateStr, slotId), 100);
}

function saveSlotMeal(slotId) {
  const dateStr = today();
  const plan = STATE.dailyPlans[dateStr];
  const slot = plan?.slots.find(s => s.id === slotId);
  if (!slot?.meal) return;
  const existingIdx = STATE.savedMeals.findIndex(m => m.name === slot.meal.name);
  if (existingIdx >= 0) {
    STATE.savedMeals.splice(existingIdx, 1);
    saveState();
    showToast(`"${slot.meal.name}" removed from saved`);
  } else {
    STATE.savedMeals.push({ id: uid(), ...slot.meal, savedAt: Date.now() });
    saveState();
    showToast(`"${slot.meal.name}" saved to favorites!`);
  }
  renderTodayInPlace(dateStr);
}

function filterSavedModal(q, dateStr, slotId) {
  const list = document.getElementById('saved-modal-list');

  const filtered = STATE.savedMeals.filter(m => m.name.toLowerCase().includes(lower));

function closeSavedModal() {
  document.getElementById('saved-modal')?.remove();
}

function useSavedMeal(dateStr, slotId, mealId) {
  const plan = getOrCreatePlan(dateStr);
  const slot = plan.slots.find(s => s.id === slotId);
  const meal = STATE.savedMeals.find(m => m.id === mealId);
  if (!slot || !meal) return;
  const isSnackSlot = slot.type === 'snack' || slot.category === 'snack' || slot.category === 'dessert';
  const slotCalLimit = isSnackSlot ? 400 : 1100;
  if ((meal.calories || 0) > slotCalLimit) {
    showToast(`"${meal.name}" (${meal.calories} cal) exceeds the ${isSnackSlot ? 'snack' : 'meal'} limit of ${slotCalLimit} cal`, 3500);
    closeSavedModal();
    return;
  }
  if (wouldExceedCalorieLimit(dateStr, meal.calories || 0, slotId)) {
    showToast(`Can't add "${meal.name}" — would exceed daily calorie limit`, 3000);
    closeSavedModal();
    return;
  }
  slot.meal = { ...meal };
  saveState();
  closeSavedModal();
  renderTodayInPlace(dateStr);
}
